async function go(){const k=document.getElementById('k').value.trim();if(!k){alert('paste key');return;}
const log=document.getElementById('log');log.innerHTML='';let ok=0;
for(const it of items){const d=document.createElement('div');d.className='r';

 try{const r=await fetch(URL_BASE+it.fn,{method:'POST',headers:{'Authorization':'Bearer '+k,'x-upsert':'true','Content-Type':'image/png'},body:b2u(it.b64)});
 if(r.ok){d.innerHTML+='<span class=ok>OK</span>';ok++;}else{d.innerHTML+='<span class=err>'+r.status+' '+(await r.text()).slice(0,80)+'</span>';}
 }catch(e){d.innerHTML+='<span class=err>'+e+'</span>';}}
