<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revise — Adrian's Math Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --background: hsl(210, 20%, 98%);
            --foreground: hsl(220, 40%, 13%);
            --card: hsl(0, 0%, 100%);
            --primary: hsl(220, 60%, 20%);
            --primary-foreground: hsl(45, 100%, 96%);
            --muted: hsl(220, 15%, 93%);
            --muted-foreground: hsl(220, 10%, 46%);
            --border: hsl(220, 15%, 88%);
            --amber: hsl(45, 90%, 55%);
            --amber-light: hsl(45, 90%, 92%);
            --amber-dark: hsl(40, 80%, 42%);
            --radius: 0.75rem;
            --font: 'DM Sans', sans-serif;
            --font-display: 'DM Serif Display', serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--background);
            color: var(--foreground);
            font-size: 17px;
            line-height: 1.75;
        }

        /* ── TOP NAV ── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: hsla(0, 0%, 100%, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--muted-foreground);
            text-decoration: none;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .back-link:hover { color: var(--primary); }

        .nav-topic {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .nav-subject {
            font-size: 12px;
            color: var(--muted-foreground);
            background: var(--muted);
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── MOBILE: TAB BAR ── */
        .tab-bar {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .tab-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            flex-shrink: 0;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: var(--background);
            border: 1.5px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.12s;
            color: var(--foreground);
        }

        .tab-item:hover { border-color: var(--primary); color: var(--primary); }

        .tab-item.active {
            background: var(--primary);
            color: var(--primary-foreground);
            border-color: var(--primary);
        }

        /* ── MAIN CONTENT ── */
        .content-area {
            max-width: 720px;
            margin: 0 auto;
            padding: 28px 16px 60px;
        }

        /* ── DESKTOP: SIDEBAR ── */
        .sidebar { display: none; }

        @media (min-width: 768px) {
            .tab-bar { display: none; }

            body { display: flex; flex-direction: column; height: 100dvh; }

            .page-body {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            .sidebar {
                display: flex;
                flex-direction: column;
                width: 256px;
                flex-shrink: 0;
                border-right: 1px solid var(--border);
                background: var(--card);
                overflow-y: auto;
                padding: 24px 16px;
                gap: 4px;
            }

            .sidebar-header {
                margin-bottom: 16px;
                padding-bottom: 16px;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-topic {
                font-family: var(--font-display);
                font-size: 18px;
                color: var(--primary);
                line-height: 1.3;
                margin-bottom: 6px;
            }

            .sidebar-subject {
                font-size: 12px;
                color: var(--muted-foreground);
                background: var(--muted);
                padding: 2px 8px;
                border-radius: 20px;
                display: inline-block;
            }

            .section-item {
                padding: 9px 12px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: var(--foreground);
                transition: all 0.12s;
                line-height: 1.4;
            }

            .section-item:hover:not(.active) {
                background: var(--muted);
                color: var(--primary);
            }

            .section-item.active {
                background: var(--primary);
                color: var(--primary-foreground);
            }

            .content-scroll {
                flex: 1;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }

            .content-area {
                padding: 32px 40px 60px;
                max-width: 760px;
            }
        }

        /* ── CONTENT TYPOGRAPHY ── */
        .content-area h1 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 20px;
            line-height: 1.25;
        }

        .content-area h2 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--primary);
            margin: 28px 0 12px;
        }

        .content-area h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--foreground);
            margin: 20px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 12px;
            color: var(--amber-dark);
        }

        .content-area p {
            margin-bottom: 14px;
        }

        .content-area ul, .content-area ol {
            margin: 0 0 14px 20px;
        }

        .content-area li { margin-bottom: 6px; }

        .content-area strong { font-weight: 600; }

        /* KaTeX */
        .content-area .katex { font-size: 1.05em; }
        .content-area .katex-display { margin: 16px 0; overflow-x: auto; }

        /* Example cards */
        .example-card {
            background: hsl(220, 40%, 98%);
            border-left: 3px solid var(--primary);
            border-radius: 0 8px 8px 0;
            padding: 14px 16px;
            margin: 16px 0;
        }

        .example-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--primary);
            margin-bottom: 8px;
        }

        /* Practice callout */
        .practice-card {
            background: var(--amber-light);
            border: 1.5px solid var(--amber);
            border-radius: 10px;
            padding: 14px 16px;
            margin: 20px 0;
        }

        .practice-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--amber-dark);
            margin-bottom: 8px;
        }

        /* Answer spoiler */
        .answer-spoiler {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            cursor: pointer;
            user-select: none;
        }

        .spoiler-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            background: var(--muted);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .spoiler-content {
            filter: blur(5px);
            transition: filter 0.3s;
            font-size: 15px;
        }

        .answer-spoiler.revealed .spoiler-content { filter: none; }
        .answer-spoiler.revealed .spoiler-label { display: none; }

        /* Note/tip boxes */
        .note-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 16px 0;
            font-size: 15px;
        }

        /* Loading / error states */
        .state-message {
            padding: 48px 24px;
            text-align: center;
            color: var(--muted-foreground);
        }

        .state-message h2 {
            font-family: var(--font-display);
            color: var(--primary);
            margin-bottom: 8px;
        }

        /* Horizontal rule between sections */
        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    </style>
</head>
<body>

<!-- TOP NAV (mobile + desktop) -->
<div class="top-nav">
    <a href="javascript:history.back()" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>
    <span class="nav-topic" id="navTopic">Loading…</span>
    <span class="nav-subject" id="navSubject"></span>
</div>

<!-- MOBILE: TAB BAR -->
<div class="tab-bar" id="tabBar"></div>

<!-- PAGE BODY (desktop: sidebar + scrollable content) -->
<div class="page-body">

    <!-- DESKTOP SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-topic" id="sidebarTopic"></div>
            <span class="sidebar-subject" id="sidebarSubject"></span>
        </div>
        <div id="sectionList"></div>
    </nav>

    <!-- SCROLLABLE CONTENT -->
    <div class="content-scroll" id="contentScroll">
        <div class="content-area" id="contentArea">
            <div class="state-message">
                <p>Loading…</p>
            </div>
        </div>
    </div>

</div>

<script>
    const params = new URLSearchParams(location.search);
    const subject = params.get('subject') || 'AM';
    const topic   = params.get('topic')   || '';

    const subjectLabels = { AM: 'A-Math', EM: 'E-Math', JC: 'H2 Math' };
    const subjectLabel = subjectLabels[subject] || subject;

    document.title = topic ? `${topic} — Adrian's Math Tuition` : 'Revise — Adrian\'s Math Tuition';
    document.getElementById('navTopic').textContent = topic || 'Revise';
    document.getElementById('navSubject').textContent = subjectLabel;
    document.getElementById('sidebarTopic').textContent = topic;
    document.getElementById('sidebarSubject').textContent = subjectLabel;

    let sections = [];
    let currentIndex = 0;

    // ── CONTENT PARSING ──
    function parseContentIntoSections(content, subtopics) {
        if (!content.trim()) return [];

        const sections = [];

        // Split on bold numbered headings (**1. Title**) or markdown headings (## Title)
        const parts = content.split(/(?=^\*\*\d+[\.:]\s|^##\s)/m);

        for (const part of parts) {
            if (!part.trim()) continue;
            const titleMatch = part.match(/^\*\*(?:\d+[\.:]\s*)?(.+?)\*\*/) || part.match(/^##\s*(.+)/m);
            if (titleMatch) {
                sections.push({ title: titleMatch[1].trim(), content: part.trim() });
            } else if (sections.length === 0) {
                sections.push({ title: 'Overview', content: part.trim() });
            }
        }

        // If we only got one section (or none), try splitting by subtopics
        if (sections.length <= 1 && subtopics.length > 0 && content.trim()) {
            return [{ title: topic || 'Notes', content: content.trim() }];
        }

        return sections.length > 0 ? sections : [{ title: topic || 'Notes', content: content.trim() }];
    }

    // ── MARKDOWN → HTML ──
    function renderMarkdown(text) {
        // Protect LaTeX from markdown processing
        const latexBlocks = [];
        const latexInline = [];

        text = text.replace(/\$\$([^$]+?)\$\$/gs, (_, math) => {
            latexBlocks.push(math);
            return `%%BLOCK${latexBlocks.length - 1}%%`;
        });
        text = text.replace(/\$([^$\n]{1,200}?)\$/g, (_, math) => {
            latexInline.push(math);
            return `%%INLINE${latexInline.length - 1}%%`;
        });

        // Practice questions: [Try:...] or [Practice:...] → callout
        text = text.replace(/\[(?:Try|Practice):\s*([\s\S]*?)\]/g, (_, q) => {
            return `<div class="practice-card"><div class="practice-label">Practice</div>${q.trim()}</div>`;
        });

        // Answers: [Ans: ...] or [Answer: ...] → spoiler
        text = text.replace(/\[Ans(?:wer)?:\s*([\s\S]*?)\]/g, (_, ans) => {
            return `<div class="answer-spoiler" onclick="this.classList.add('revealed')"><span class="spoiler-label">Tap to reveal answer</span><span class="spoiler-content">${ans.trim()}</span></div>`;
        });

        // Example headings: **Example N:** or **Example:**
        text = text.replace(/\*\*Example(?:\s+\d+)?[:\.]?\*\*/gi, '<div class="example-label">Example</div>');

        // Note boxes: **Note:** ... until double newline
        text = text.replace(/\*\*Note:\*\*([^\n]+)/g, '<div class="note-box"><strong>Note:</strong>$1</div>');

        // Bold
        text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

        // Headings (##)
        text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
        text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');

        // Bullet lists
        text = text.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
        text = text.replace(/(<li>.*<\/li>(\n)?)+/gs, '<ul>$&</ul>');

        // Numbered lists
        text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

        // Horizontal rules
        text = text.replace(/^---+$/gm, '<hr>');

        // Paragraphs: double newline → paragraph break
        text = text.replace(/\n{2,}/g, '</p><p>');
        text = '<p>' + text + '</p>';

        // Clean up empty paragraphs
        text = text.replace(/<p>\s*<\/p>/g, '');
        text = text.replace(/<p>(<(?:h[1-6]|ul|ol|hr|div)[^>]*>)/g, '$1');
        text = text.replace(/(<\/(?:h[1-6]|ul|ol|div)>)<\/p>/g, '$1');

        // Single newlines within paragraphs → <br>
        text = text.replace(/([^>])\n([^<])/g, '$1<br>$2');

        // Restore LaTeX
        text = text.replace(/%%BLOCK(\d+)%%/g, (_, i) => `$$${latexBlocks[i]}$$`);
        text = text.replace(/%%INLINE(\d+)%%/g, (_, i) => `$${latexInline[i]}$`);

        return text;
    }

    // ── RENDER MATH ──
    function renderMath(el) {
        if (typeof renderMathInElement === 'undefined') {
            setTimeout(() => renderMath(el), 100);
            return;
        }
        try {
            renderMathInElement(el, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$',  right: '$',  display: false }
                ],
                throwOnError: false
            });
        } catch(e) {}
    }

    // ── SHOW SECTION ──
    function showSection(index) {
        if (index < 0 || index >= sections.length) return;
        currentIndex = index;

        // Update active state
        document.querySelectorAll('.section-item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });
        document.querySelectorAll('.tab-item').forEach((el, i) => {
            el.classList.toggle('active', i === index);
            if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });

        // Render content
        const section = sections[index];
        const area = document.getElementById('contentArea');
        area.innerHTML = `<h1>${escapeHtml(section.title)}</h1>` + renderMarkdown(section.content);
        renderMath(area);

        // Scroll to top
        const scroll = document.getElementById('contentScroll');
        if (scroll) scroll.scrollTop = 0;
        else window.scrollTo(0, 0);
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── BUILD NAV ──
    function buildNav() {
        const tabBar = document.getElementById('tabBar');
        const sectionList = document.getElementById('sectionList');
        tabBar.innerHTML = '';
        sectionList.innerHTML = '';

        sections.forEach((sec, i) => {
            // Mobile tab
            const tab = document.createElement('button');
            tab.className = 'tab-item' + (i === 0 ? ' active' : '');
            tab.textContent = sec.title;
            tab.onclick = () => showSection(i);
            tabBar.appendChild(tab);

            // Desktop sidebar item
            const item = document.createElement('div');
            item.className = 'section-item' + (i === 0 ? ' active' : '');
            item.textContent = sec.title;
            item.onclick = () => showSection(i);
            sectionList.appendChild(item);
        });
    }

    // ── LOAD ──
    async function loadRevision() {
        if (!topic) {
            document.getElementById('contentArea').innerHTML = '<div class="state-message"><h2>No topic specified</h2><p>Add ?topic=... to the URL.</p></div>';
            return;
        }

        try {
            const resp = await fetch(`/api/revise?subject=${encodeURIComponent(subject)}&topic=${encodeURIComponent(topic)}`);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();

            // Prefer Generated Content, fall back to Content
            const rawContent = data.generatedContent || data.content || '';

            if (!rawContent.trim()) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="state-message">
                        <h2>${escapeHtml(topic)}</h2>
                        <p>No notes available for this topic yet.</p>
                    </div>`;
                return;
            }

            sections = parseContentIntoSections(rawContent, data.subtopics || []);

            if (sections.length === 0) {
                document.getElementById('contentArea').innerHTML = '<div class="state-message"><p>Could not parse content.</p></div>';
                return;
            }

            buildNav();
            showSection(0);

        } catch(err) {
            console.error(err);
            document.getElementById('contentArea').innerHTML = `
                <div class="state-message">
                    <h2>Failed to load</h2>
                    <p>Could not load notes. Please try again.</p>
                </div>`;
        }
    }

    loadRevision();
</script>
</body>
</html>
