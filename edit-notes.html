<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Notes — Adrian's Math Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --background: hsl(210, 20%, 98%);
            --foreground: hsl(220, 40%, 13%);
            --card: hsl(0, 0%, 100%);
            --primary: hsl(220, 60%, 20%);
            --primary-foreground: hsl(45, 100%, 96%);
            --muted: hsl(220, 15%, 93%);
            --muted-foreground: hsl(220, 10%, 46%);
            --border: hsl(220, 15%, 88%);
            --amber: hsl(45, 90%, 55%);
            --amber-light: hsl(45, 90%, 92%);
            --amber-dark: hsl(40, 80%, 42%);
            --success: hsl(142, 55%, 40%);
            --success-light: hsl(142, 55%, 94%);
            --error: hsl(0, 65%, 48%);
            --error-light: hsl(0, 65%, 95%);
            --editor-bg: hsl(220, 30%, 10%);
            --editor-fg: hsl(220, 15%, 88%);
            --editor-line: hsl(220, 25%, 18%);
            --radius: 0.75rem;
            --font: 'DM Sans', sans-serif;
            --font-display: 'DM Serif Display', serif;
            --font-mono: 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
        }

        html, body {
            font-family: var(--font);
            background: var(--background);
            color: var(--foreground);
            font-size: 15px;
            line-height: 1.6;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── TOP NAV ── */
        nav.top-nav {
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            background: hsla(0, 0%, 100%, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 50;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--muted-foreground);
            text-decoration: none;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .back-link:hover { color: var(--primary); }

        .nav-title {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--primary);
            flex: 1;
        }

        .nav-badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted-foreground);
            background: var(--muted);
            padding: 3px 8px;
            border-radius: 20px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 11px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--success-light); color: var(--success); border: 1px solid hsl(142,55%,75%); }
        .toast.error   { background: var(--error-light);   color: var(--error);   border: 1px solid hsl(0,65%,80%); }

        /* ── PASSWORD GATE ── */
        #passwordGate {
            position: fixed; inset: 0; z-index: 100;
            background: var(--background);
            display: flex; align-items: center; justify-content: center;
        }

        .password-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .password-card h1 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .password-card p {
            font-size: 14px;
            color: var(--muted-foreground);
            margin-bottom: 24px;
        }

        .password-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 15px;
            background: var(--background);
            color: var(--foreground);
            margin-bottom: 12px;
            transition: border-color 0.15s;
            outline: none;
        }
        .password-input:focus { border-color: var(--primary); }
        .password-input.shake {
            animation: shake 0.35s ease;
            border-color: var(--error);
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }

        /* ── EDITOR LAYOUT ── */
        #appShell { flex: 1; overflow: hidden; }

        /* ── SIDEBAR ── */
        .topic-sidebar {
            width: 240px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: var(--card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-search {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-search input {
            width: 100%;
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 13px;
            background: var(--background);
            color: var(--foreground);
            outline: none;
            transition: border-color 0.15s;
        }
        .sidebar-search input:focus { border-color: var(--primary); }

        .topic-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .topic-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .topic-item:hover { background: var(--muted); }
        .topic-item.active { background: var(--primary); color: var(--primary-foreground); }

        .topic-item .level-tag {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .topic-item.active .level-tag { opacity: 0.8; }

        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .btn-new-topic {
            width: 100%;
            padding: 8px;
            background: var(--muted);
            color: var(--primary);
            border: 1.5px dashed var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.12s;
        }
        .btn-new-topic:hover { background: var(--background); border-color: var(--primary); }

        /* ── MAIN EDITOR AREA ── */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Metadata bar */
        .meta-bar {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .meta-field {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted-foreground);
            white-space: nowrap;
        }

        .meta-input {
            padding: 5px 9px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 13px;
            background: var(--background);
            color: var(--foreground);
            outline: none;
            transition: border-color 0.15s;
            min-width: 120px;
        }
        .meta-input:focus { border-color: var(--primary); }

        .meta-select {
            padding: 5px 9px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 13px;
            background: var(--background);
            color: var(--foreground);
            outline: none;
            transition: border-color 0.15s;
            cursor: pointer;
        }
        .meta-select:focus { border-color: var(--primary); }

        .slug-display {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted-foreground);
            background: var(--muted);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .meta-spacer { flex: 1; }

        .btn-save {
            padding: 7px 18px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 7px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-save:hover { opacity: 0.88; }
        .btn-save:disabled { opacity: 0.5; cursor: default; }
        .btn-save.saved { background: var(--success); }

        /* ── PANE SPLIT ── */
        .pane-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pane-editor { flex: 1.2; min-height: 120px; border-bottom: 1px solid var(--border); }
        .pane-preview { flex: 1; min-height: 80px; }

        .pane-header {
            padding: 6px 16px;
            background: var(--muted);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
        }

        .pane-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted-foreground);
        }

        .line-count {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted-foreground);
        }

        /* ── CODE EDITOR ── */
        .editor-wrap {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--editor-bg);
            scrollbar-width: thin;
            scrollbar-color: hsl(220,20%,25%) transparent;
        }

        #editor {
            display: block;
            width: 100%;
            min-height: 100%;
            padding: 14px 16px 14px 52px;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
            color: var(--editor-fg);
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            caret-color: hsl(45, 90%, 70%);
        }

        .line-numbers {
            position: absolute;
            top: 0; left: 0;
            width: 40px;
            padding: 14px 0;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
            color: hsl(220, 15%, 40%);
            user-select: none;
            pointer-events: none;
        }

        .line-numbers span { display: block; padding-right: 8px; }

        /* ── PREVIEW ── */
        .preview-wrap {
            flex: 1;
            overflow-y: auto;
            background: var(--background);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #preview {
            max-width: 680px;
            padding: 20px 24px 40px;
            font-size: 15px;
            line-height: 1.8;
        }

        /* Preview typography */
        #preview .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 16px;
            line-height: 1.2;
        }
        #preview h2 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--primary);
            margin: 24px 0 10px;
        }
        #preview h3 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--amber-dark);
            margin: 20px 0 8px;
        }
        #preview p { margin-bottom: 12px; }
        #preview ul, #preview ol { margin: 0 0 12px 20px; }
        #preview li { margin-bottom: 4px; }
        #preview strong { font-weight: 600; }
        #preview em { font-style: italic; }
        #preview hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
        #preview .katex { font-size: 1.05em; }
        #preview .katex-display { margin: 14px 0; overflow-x: auto; }

        #preview .example-card {
            background: hsl(220, 40%, 97%);
            border-left: 3px solid var(--primary);
            border-radius: 0 8px 8px 0;
            padding: 13px 16px;
            margin: 16px 0;
        }
        #preview .example-card-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary);
            margin-bottom: 8px;
            opacity: 0.7;
        }
        #preview .practice-callout {
            background: var(--amber-light);
            border: 1.5px solid var(--amber);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 16px 0;
        }
        #preview .practice-callout-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--amber-dark);
            margin-bottom: 8px;
        }
        #preview .answer-spoiler {
            display: inline-block;
            cursor: pointer;
            padding: 4px 12px;
            background: var(--background);
            border: 1px dashed var(--border);
            border-radius: 6px;
            margin-top: 6px;
        }
        #preview .answer-spoiler .answer-text {
            filter: blur(5px);
            transition: filter 0.3s;
            user-select: none;
        }
        #preview .answer-spoiler.revealed .answer-text { filter: none; user-select: auto; }
        #preview .answer-spoiler .reveal-label {
            font-size: 11px;
            color: var(--muted-foreground);
            display: block;
            margin-bottom: 2px;
        }
        #preview .answer-spoiler.revealed .reveal-label { display: none; }

        #preview table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
        #preview th { background: var(--muted); font-weight: 600; padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
        #preview td { padding: 7px 12px; border: 1px solid var(--border); }

        /* ── EMPTY STATE ── */
        .editor-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted-foreground);
            text-align: center;
            padding: 40px;
        }
        .editor-empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .editor-empty p { font-size: 14px; }

        /* ── MOBILE ADJUSTMENTS ── */
        @media (max-width: 767px) {
            html, body { overflow: auto; height: auto; }
            #appShell { flex-direction: column; height: auto; overflow: visible; }

            .topic-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .topic-list { max-height: 160px; }

            .pane-container { height: auto; }
            .pane-editor { min-height: 300px; }
            .pane-preview { min-height: 200px; }

            #editor { white-space: pre-wrap; overflow-x: hidden; }
        }
    </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="passwordGate">
    <div class="password-card">
        <h1>Edit Notes</h1>
        <p>Enter your admin password to continue.</p>
        <input type="password" class="password-input" id="passwordInput" placeholder="Password" autocomplete="current-password">
        <button class="btn-primary" id="passwordSubmit">Continue</button>
    </div>
</div>

<!-- TOP NAV -->
<nav class="top-nav">
    <a href="javascript:history.back()" class="back-link" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>
    <span class="nav-title">Edit Notes</span>
    <span class="nav-badge" id="navStatus">Loading…</span>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP SHELL (hidden until authed) -->
<div id="appShell" style="display:none">

    <!-- SIDEBAR: TOPIC LIST -->
    <aside class="topic-sidebar">
        <div class="sidebar-search">
            <input type="search" id="topicSearch" placeholder="Search topics…" autocomplete="off">
        </div>
        <div class="topic-list" id="topicList">
            <div style="padding:16px;font-size:13px;color:var(--muted-foreground)">Loading…</div>
        </div>
        <div class="sidebar-footer">
            <button class="btn-new-topic" id="btnNewTopic">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Topic
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="editor-main" id="editorMain">

        <!-- EMPTY STATE -->
        <div class="editor-empty" id="editorEmpty">
            <div>
                <div class="empty-icon">📝</div>
                <p>Select a topic from the list,<br>or create a new one.</p>
            </div>
        </div>

        <!-- EDITOR SHELL (shown when topic selected) -->
        <div id="editorShell" style="display:none; flex-direction:column; flex:1; overflow:hidden;">

            <!-- META BAR -->
            <div class="meta-bar">
                <div class="meta-field">
                    <span class="meta-label">Topic</span>
                    <input type="text" class="meta-input" id="metaTopic" placeholder="e.g. Binomial Expansion" style="min-width:180px">
                </div>
                <div class="meta-field">
                    <span class="meta-label">Level</span>
                    <select class="meta-select" id="metaLevel">
                        <option value="AM">A-Math (Sec)</option>
                        <option value="EM">E-Math (Sec)</option>
                        <option value="JC">H2 Math (JC)</option>
                    </select>
                </div>
                <div class="meta-field">
                    <span class="meta-label">Slug</span>
                    <span class="slug-display" id="metaSlug">—</span>
                </div>
                <div class="meta-spacer"></div>
                <button class="btn-save" id="btnSave">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save
                </button>
            </div>

            <!-- PANES: EDITOR + PREVIEW -->
            <div class="pane-container">

                <div class="pane pane-editor">
                    <div class="pane-header">
                        <span class="pane-label">Editor</span>
                        <span class="line-count" id="lineCount">0 lines</span>
                    </div>
                    <div class="editor-wrap" id="editorWrap">
                        <div class="line-numbers" id="lineNumbers"></div>
                        <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="Start writing content here…&#10;&#10;Use **bold headings** for sections:&#10;&#10;**1. Binomial Expansion**&#10;The binomial theorem states...&#10;&#10;**Example 1:**&#10;Expand $(1+x)^4$&#10;&#10;[Try: Expand $(2+x)^3$]&#10;[Ans: $8 + 12x + 6x^2 + x^3$]"></textarea>
                    </div>
                </div>

                <div class="pane pane-preview">
                    <div class="pane-header">
                        <span class="pane-label">Preview</span>
                        <span style="font-size:11px;color:var(--muted-foreground)">Live • KaTeX rendered</span>
                    </div>
                    <div class="preview-wrap">
                        <div id="preview"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let password     = '';
let allTopics    = [];
let currentSlug  = null;
let previewTimer = null;

// ── PASSWORD GATE ─────────────────────────────────────────────────
const passwordGate   = document.getElementById('passwordGate');
const passwordInput  = document.getElementById('passwordInput');
const passwordSubmit = document.getElementById('passwordSubmit');

function setGate(visible) {
    passwordGate.style.display = visible ? 'flex' : 'none';
    document.getElementById('appShell').style.display = visible ? 'none' : 'flex';
}

async function tryPassword() {
    const val = passwordInput.value.trim();
    if (!val) return;
    passwordSubmit.disabled = true;
    passwordSubmit.textContent = 'Checking…';
    password = val;
    await loadApp();
}

passwordSubmit.addEventListener('click', tryPassword);
passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

// Restore from session — try silently, restore gate if it fails
const savedPass = sessionStorage.getItem('editNotesPass');
if (savedPass) {
    password = savedPass;
    setGate(false); // optimistic: hide gate while verifying
    loadApp();
}

async function loadApp() {
    try {
        // Use plain fetch (no Authorization header) — password via query param only
        const resp = await fetch(`/api/notes?list=all&password=${encodeURIComponent(password)}`);
        if (resp.status === 401) { const e = new Error('Unauthorized'); e.status = 401; throw e; }
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        sessionStorage.setItem('editNotesPass', password);
        allTopics = Array.isArray(data) ? data : [];
        renderTopicList(allTopics);
        setGate(false);
        document.getElementById('navStatus').textContent = `${allTopics.length} topics`;
        passwordSubmit.disabled = false;
        passwordSubmit.textContent = 'Continue';
    } catch (err) {
        passwordSubmit.disabled = false;
        passwordSubmit.textContent = 'Continue';
        setGate(true);
        if (err.status === 401) {
            sessionStorage.removeItem('editNotesPass');
            password = '';
            passwordInput.classList.add('shake');
            setTimeout(() => passwordInput.classList.remove('shake'), 400);
            passwordInput.value = '';
        } else {
            showToast('Connection failed — check your network', 'error');
        }
        passwordInput.focus();
    }
}

// ── API HELPER ────────────────────────────────────────────────────
async function apiFetch(url, options = {}) {
    const opts = {
        headers: { 'Content-Type': 'application/json' },
        ...options
    };
    if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
    const resp = await fetch(url, opts);
    if (!resp.ok) {
        let detail = '';
        try { const j = await resp.json(); detail = j.error || JSON.stringify(j); } catch(e) {}
        const e = new Error(`HTTP ${resp.status}${detail ? ': ' + detail : ''}`);
        e.status = resp.status;
        throw e;
    }
    return resp.json();
}

// ── TOPIC LIST ────────────────────────────────────────────────────
function renderTopicList(topics, filter = '') {
    const list = document.getElementById('topicList');
    const filtered = filter
        ? topics.filter(t => t.fields.Topic?.toLowerCase().includes(filter.toLowerCase()))
        : topics;

    if (filtered.length === 0) {
        list.innerHTML = '<div style="padding:12px 10px;font-size:13px;color:var(--muted-foreground)">No topics found</div>';
        return;
    }

    list.innerHTML = filtered.map(t => {
        const slug = t.fields.Slug || '';
        const active = slug === currentSlug ? ' active' : '';
        return `<div class="topic-item${active}" onclick="loadTopic('${escapeAttr(slug)}')" data-slug="${escapeAttr(slug)}">
            <span>${escapeHtml(t.fields.Topic || 'Untitled')}</span>
            <span class="level-tag">${escapeHtml(t.fields.Level || '')}</span>
        </div>`;
    }).join('');
}

document.getElementById('topicSearch').addEventListener('input', e => {
    renderTopicList(allTopics, e.target.value);
});

// ── LOAD TOPIC ────────────────────────────────────────────────────
async function loadTopic(slug) {
    currentSlug = slug;

    // Update sidebar active state
    document.querySelectorAll('.topic-item').forEach(el => {
        el.classList.toggle('active', el.dataset.slug === slug);
    });

    showEditorShell(true);
    document.getElementById('editor').value = '';
    document.getElementById('preview').innerHTML = '<p style="color:var(--muted-foreground);padding:20px">Loading…</p>';

    try {
        const record = await apiFetch(`/api/notes?slug=${encodeURIComponent(slug)}&password=${encodeURIComponent(password)}`);
        if (!record) { showToast('Topic not found', 'error'); return; }

        const f = record.fields;
        console.log('[loadTopic] f.Level:', JSON.stringify(f.Level));
        document.getElementById('metaTopic').value = f.Topic || '';
        document.getElementById('metaLevel').value = f.Level || 'AM';
        document.getElementById('metaSlug').textContent = f.Slug || slug;
        document.getElementById('editor').value = f.Content || '';

        updateLineNumbers();
        updatePreview();
    } catch (err) {
        showToast('Failed to load topic', 'error');
    }
}

// ── NEW TOPIC ─────────────────────────────────────────────────────
document.getElementById('btnNewTopic').addEventListener('click', () => {
    currentSlug = '__new__';
    document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
    document.getElementById('metaTopic').value = '';
    document.getElementById('metaLevel').value = 'AM';
    document.getElementById('metaSlug').textContent = '—';
    document.getElementById('editor').value = '';
    document.getElementById('preview').innerHTML = '';
    updateLineNumbers();
    showEditorShell(true);
    document.getElementById('metaTopic').focus();
});

function showEditorShell(show) {
    document.getElementById('editorEmpty').style.display  = show ? 'none' : 'flex';
    document.getElementById('editorShell').style.display  = show ? 'flex' : 'none';
}

// ── SLUG GENERATION ───────────────────────────────────────────────
function generateSlug(topic, level) {
    return topic.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')
        + '-' + (level === 'JC' ? 'jc' : 'sec');
}

document.getElementById('metaTopic').addEventListener('input', () => {
    const topic = document.getElementById('metaTopic').value;
    const level = document.getElementById('metaLevel').value;
    if (currentSlug === '__new__' && topic) {
        const slug = generateSlug(topic, level);
        document.getElementById('metaSlug').textContent = slug;
    }
});

document.getElementById('metaLevel').addEventListener('change', () => {
    const topic = document.getElementById('metaTopic').value;
    const level = document.getElementById('metaLevel').value;
    if (currentSlug === '__new__' && topic) {
        document.getElementById('metaSlug').textContent = generateSlug(topic, level);
    }
});

// ── EDITOR: LINE NUMBERS + TAB ────────────────────────────────────
const editor = document.getElementById('editor');

editor.addEventListener('input', () => {
    updateLineNumbers();
    schedulePreview();
});

editor.addEventListener('scroll', syncLineNumbers);

editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end   = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
        updateLineNumbers();
    }
    // Cmd+S / Ctrl+S → save
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveNotes();
    }
});

function updateLineNumbers() {
    const lines = editor.value.split('\n');
    const count = lines.length;
    document.getElementById('lineCount').textContent = `${count} line${count !== 1 ? 's' : ''}`;
    document.getElementById('lineNumbers').innerHTML = lines.map((_, i) => `<span>${i + 1}</span>`).join('');
}

function syncLineNumbers() {
    document.getElementById('lineNumbers').style.transform = `translateY(-${editor.scrollTop}px)`;
}

// ── LIVE PREVIEW ──────────────────────────────────────────────────
function schedulePreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 300);
}

function updatePreview() {
    const text = editor.value;
    const preview = document.getElementById('preview');
    if (!text.trim()) { preview.innerHTML = ''; return; }

    // Render first section title for preview heading
    const firstHeading = text.match(/\*\*(?:\d+[\.:]\s*)?(.+?)\*\*/);
    const title = firstHeading ? firstHeading[1].trim() : '';

    preview.innerHTML = (title ? `<div class="section-title">${escapeHtml(title)}</div>` : '') +
        renderMarkdown(text.replace(/^\*\*[^*]+\*\*\s*\n?/, ''));

    renderMath(preview);
}

// ── MARKDOWN RENDERER (mirrors revise.html) ───────────────────────
function renderMarkdown(text) {
    const blocks  = [];
    const inlines = [];
    text = text.replace(/\$\$([^$]+?)\$\$/gs, (_, m) => { blocks.push(m);  return `%%B${blocks.length-1}%%`; });
    text = text.replace(/\$([^$\n]{1,300}?)\$/g, (_, m) => { inlines.push(m); return `%%I${inlines.length-1}%%`; });

    // Example cards
    text = text.replace(
        /\*\*Example(?:\s+\d+)?[:\.]?\*\*([^\n]*)([\s\S]*?)(?=\n\*\*|\n##|$)/g,
        (_, firstLine, rest) => {
            const inner = (firstLine.trim() + '\n' + rest).trim();
            return `\n<div class="example-card"><div class="example-card-label">Worked Example</div>${inner}\n</div>\n`;
        }
    );

    // Practice callouts
    text = text.replace(/\[(?:Try|Practice):\s*([\s\S]*?)\]/g, (_, q) =>
        `<div class="practice-callout"><div class="practice-callout-label">Try this</div>${q.trim()}</div>`
    );

    // Answer spoilers
    text = text.replace(/\[Ans(?:wer)?:\s*([\s\S]*?)\]/g, (_, ans) =>
        `<div class="answer-spoiler" onclick="this.classList.toggle('revealed')" title="Click to reveal"><span class="reveal-label">Tap to reveal answer</span><span class="answer-text">${ans.trim()}</span></div>`
    );

    // Note boxes
    text = text.replace(/\*\*Note:\*\*\s*([^\n]+)/g, '<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin:12px 0;font-size:14px"><strong>Note:</strong> $1</div>');

    // Tables
    text = text.replace(/((?:^\|.+\|\s*\n)+)/gm, tableBlock => {
        const rows = tableBlock.trim().split('\n').filter(r => r.trim());
        let html = '<table>';
        rows.forEach((row, i) => {
            if (/^\|[-| :]+\|/.test(row)) return;
            const cells = row.split('|').filter((_, ci) => ci > 0 && ci < row.split('|').length - 1);
            const tag = i === 0 ? 'th' : 'td';
            html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
        });
        return html + '</table>';
    });

    text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^##\s+(.+)$/gm,  '<h2>$1</h2>');
    text = text.replace(/^---+$/gm, '<hr>');
    text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    text = text.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

    text = text.replace(/\n{2,}/g, '</p><p>');
    text = '<p>' + text + '</p>';
    text = text.replace(/<p>\s*<\/p>/g, '');
    text = text.replace(/<p>(<(?:h[1-6]|ul|ol|hr|div|table)[^>]*>)/g, '$1');
    text = text.replace(/(<\/(?:h[1-6]|ul|ol|div|table)>)<\/p>/g, '$1');
    text = text.replace(/([^>])\n([^<])/g, '$1<br>$2');

    text = text.replace(/%%B(\d+)%%/g,  (_, i) => `$$${blocks[i]}$$`);
    text = text.replace(/%%I(\d+)%%/g,  (_, i) => `$${inlines[i]}$`);
    return text;
}

function renderMath(el) {
    if (typeof renderMathInElement === 'undefined') { setTimeout(() => renderMath(el), 80); return; }
    try {
        renderMathInElement(el, {
            delimiters: [{ left:'$$',right:'$$',display:true },{ left:'$',right:'$',display:false }],
            throwOnError: false
        });
    } catch(e) {}
}

// ── SAVE ──────────────────────────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', saveNotes);

async function saveNotes() {
    const topic = document.getElementById('metaTopic').value.trim();
    const level = document.getElementById('metaLevel').value || 'AM';  // fallback if Airtable Level doesn't match option values
    const content = editor.value;
    console.log('[save] topic:', topic, 'level:', level, 'slug:', currentSlug);

    if (!topic) { showToast('Topic name is required', 'error'); document.getElementById('metaTopic').focus(); return; }

    const slug = currentSlug === '__new__'
        ? generateSlug(topic, level)
        : (document.getElementById('metaSlug').textContent || generateSlug(topic, level));

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0"/></svg> Saving…`;

    try {
        const result = await apiFetch(
            `/api/notes?password=${encodeURIComponent(password)}&slug=${encodeURIComponent(slug)}&topic=${encodeURIComponent(topic)}&level=${encodeURIComponent(level)}`,
            { method: 'POST', body: { content } }
        );

        // Update slug display
        document.getElementById('metaSlug').textContent = slug;
        currentSlug = slug;

        // Refresh topic list
        const topics = await apiFetch(`/api/notes?list=all&password=${encodeURIComponent(password)}`);
        allTopics = topics;
        renderTopicList(topics, document.getElementById('topicSearch').value);
        document.getElementById('navStatus').textContent = `${topics.length} topics`;

        btn.disabled = false;
        btn.classList.add('saved');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
        setTimeout(() => {
            btn.classList.remove('saved');
            btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save`;
        }, 3000);

        showToast(result.action === 'created' ? 'Topic created' : 'Saved', 'success');
    } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save`;
        console.error('[save]', err);
        showToast(`Save failed: ${err.message}`, 'error');
    }
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── HELPERS ───────────────────────────────────────────────────────
function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
    return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Spin keyframe
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// Init line numbers on load
updateLineNumbers();
</script>
