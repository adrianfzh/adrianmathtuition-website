<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Quadratic Functions and Inequalities — Phone Swipe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>/* Style: Phone Swipe — full-screen card deck, swipe to navigate, tap to hear narration.
 * Reading-first: students swipe through silently, tap 🔊 if they want narration.
 *
 * Layout strategy: horizontal scroll-snap container; each .scene is one snap point.
 * Native browser swipe gestures handle navigation (no JS lib needed).
 */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body.style-phone {
  background: #f4ede0;
  color: #2a2a2a;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Hide the desktop player chrome — the phone uses its own UI */
.controls { display: none !important; }

.player-shell {
  flex: 1;
  width: 100%;
  height: 100vh;
  position: relative;
}
/* Stage = VERTICAL scroll-snap stack of scene cards (swipe up/down) */
.stage {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stage::-webkit-scrollbar { display: none; }

.scene {
  flex: 0 0 100vh;
  width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  scroll-snap-stop: always;
  background: #fff;
  display: flex;
  flex-direction: column;
  padding: 24px 20px 100px;
  overflow-y: auto;
  position: relative;
  border-bottom: 1px solid #f0e8d8;
}
.scene::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #d4b896 0%, #c0a380 100%);
}
.scene-kind-badge {
  align-self: flex-start;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  padding: 3px 10px;
  border-radius: 10px;
  background: #faf3e8;
  color: #7a6753;
  border: 1px solid #e0d4bc;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.scene-kind-badge.revealed { opacity: 1; transform: translateY(0); }
.scene-title {
  font-size: 22px;
  font-weight: 700;
  color: #2a2a2a;
  margin: 4px 0 14px;
  letter-spacing: -0.01em;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
}
.scene-title.revealed { opacity: 1; transform: translateY(0); }
.scene-body { flex: 1; }

/* In phone mode, the FULL scene is visible immediately on swipe-in.
   When narration plays, the block currently being narrated is highlighted
   (karaoke-style) so the student can follow along. */
.block { transition: background 0.4s ease, transform 0.3s ease, box-shadow 0.4s ease; }
.block.pre-reveal, .block.revealed { opacity: 1; transform: translateY(0); }

/* Active = the block the narration is currently on */
.block.active {
  background: linear-gradient(90deg, rgba(212, 184, 150, 0.32), rgba(212, 184, 150, 0.18));
  box-shadow: 0 0 0 2px rgba(212, 184, 150, 0.5);
  border-radius: 6px;
}
.block.active.block-math {
  background: rgba(212, 184, 150, 0.22);
  box-shadow: 0 0 0 2px rgba(212, 184, 150, 0.55);
}
.block.active.block-callout {
  /* preserve callout's own bg colour, just add the highlight glow */
  box-shadow: 0 0 0 2px rgba(212, 184, 150, 0.6);
}

.block-heading {
  font-size: 16px;
  font-weight: 600;
  color: #5a4a33;
  margin: 16px 0 6px;
}
.block-paragraph, .block-bullet { margin: 6px 0; font-size: 15px; }
.block-list { list-style: none; padding: 0; margin: 8px 0; }
.block-bullet { padding-left: 20px; position: relative; }
.block-bullet::before {
  content: '';
  position: absolute; left: 4px; top: 9px;
  width: 6px; height: 6px;
  background: #d4b896; border-radius: 50%;
}
.block-math {
  margin: 12px 0;
  font-size: 18px;
  background: #faf3e8;
  border-radius: 6px;
  padding: 12px 14px;
  border-left: 3px solid #d4b896;
  overflow-x: auto;
}
.block-callout {
  margin: 10px 0;
  padding: 10px 12px;
  border-radius: 5px;
  font-size: 13px;
}
.block-callout-info { background: #e8f0f6; color: #1f3d5a; border-left: 3px solid #4a7ba8; }
.block-callout-warning { background: #fbeee2; color: #7a3a14; border-left: 3px solid #d96f2f; }
.block-callout-tip { background: #e8f4ec; color: #1f6f3a; border-left: 3px solid #2a8a4a; }
.block-image { margin: 10px 0; }
.block-image img { max-width: 100%; height: auto; border-radius: 4px; }

/* Counter pill — fixed top-left so it doesn't compete with the play button */
.phone-counter {
  position: fixed;
  top: 14px; left: 14px;
  font-size: 12px;
  color: #5a4a33;
  font-weight: 600;
  background: rgba(255,255,255,0.94);
  padding: 6px 12px;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  z-index: 10;
}

/* Speed cycle button — sits to the LEFT of the play button at bottom-right.
   Tap to cycle 1× → 1.25× → 1.5× → 2× → back to 1×. */
.phone-speed-btn {
  position: fixed;
  bottom: 32px;
  right: 92px;            /* play button is 60px wide at right:20px → 80px from right edge; gap 12px */
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #faf3e8;
  border: 1px solid #d4b896;
  color: #5a4a33;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.14);
  z-index: 10;
  font-family: inherit;
  transition: background 0.15s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.phone-speed-btn:active { transform: scale(0.93); }
.phone-speed-btn.fast { background: #d4b896; color: #fff; border-color: #b89a78; }

/* Floating play button — bottom-right corner */
.phone-play-btn {
  position: fixed;
  bottom: 24px; right: 20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: #5a4a33;
  color: #fff;
  border: 0;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.22);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  z-index: 10;
}
.phone-play-btn:active { transform: scale(0.93); }
.phone-play-btn.playing {
  background: #d96f2f;
  box-shadow: 0 4px 20px rgba(217, 111, 47, 0.4);
}

/* Audio progress bar — slim line at the bottom */
.phone-progress {
  position: fixed;
  bottom: 0; left: 0;
  height: 3px;
  background: #d4b896;
  width: 0%;
  transition: width 0.1s linear;
  z-index: 10;
}

/* Swipe hint — first-time only; arrow points DOWN now */
.swipe-hint {
  position: fixed;
  bottom: 100px; left: 50%;
  transform: translateX(-50%);
  background: rgba(90, 74, 51, 0.92);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 11;
  pointer-events: none;
  animation: swipeHint 4.5s ease-out forwards;
  white-space: nowrap;
}
@keyframes swipeHint {
  0%, 65% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
}
</style>
</head>

</div>

<script>// Phone-swipe player. Same scene data, swipe-driven UX.
// - Horizontal scroll-snap container = native swipe gestures
// - Visible scene's blocks reveal once it scrolls into view
// - Floating bottom play button: tap to hear narration of CURRENT scene
//   When playing, blocks reveal synced to audio time (just like desktop)

(function () {
  const scenes = (window.SCENES && Array.isArray(window.SCENES.scenes)) ? window.SCENES.scenes : [];
  if (!scenes.length) {
    document.getElementById('stage').innerHTML = '<div class="error">No scenes found.</div>';
    return;
  }
  const stage = document.getElementById('stage');
  const audio = document.getElementById('audio');

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function renderBlock(block) {
    if (!block || !block.type) return '';
    const r = (typeof block.reveal_at_seconds === 'number' ? block.reveal_at_seconds : 0);
    const dataAttr = `data-reveal-at="${r}"`;
    if (block.type === 'heading') return `<h2 class="block block-heading pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</h2>`;
    if (block.type === 'bullet') return `<li class="block block-bullet pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</li>`;
    if (block.type === 'callout') {
      const kind = block.kind || 'info';
      return `<div class="block block-callout block-callout-${kind} pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</div>`;
    }
    if (block.type === 'math') {
      return `<div class="block block-math pre-reveal" ${dataAttr} data-latex="${escapeHtml(block.latex || '')}"></div>`;
    }
    if (block.type === 'image') {
      const cap = block.caption ? `<div class="img-caption">${escapeHtml(block.caption)}</div>` : '';
      return `<figure class="block block-image pre-reveal" ${dataAttr}><img src="${escapeHtml(block.src)}" alt="${escapeHtml(block.caption || '')}">${cap}</figure>`;
    }
    if (block.type === 'paragraph' || block.type === 'text') {
      return `<p class="block block-paragraph pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</p>`;
    }
    return '';
  }

  // Render all scenes upfront (they're in a horizontal scroll container)
  function renderAllScenes() {
    stage.innerHTML = scenes.map(scene => {
      const blocks = Array.isArray(scene.blocks) ? scene.blocks : [];
      let html = '';
      let inList = false;
      blocks.forEach(b => {
        const isBullet = b && b.type === 'bullet';
        if (isBullet && !inList) { html += '<ul class="block-list">'; inList = true; }
        if (!isBullet && inList) { html += '</ul>'; inList = false; }
        html += renderBlock(b);
      });
      if (inList) html += '</ul>';
      return `
        <div class="scene scene-${scene.kind || 'concept'}" data-scene-id="${scene.id}">
          <div class="scene-kind-badge">${escapeHtml((scene.kind || '').toUpperCase())}</div>
          <h1 class="scene-title">${escapeHtml(scene.title || '')}</h1>
          <div class="scene-body">${html}</div>
        </div>
      `;
    }).join('');

    // Render KaTeX after all scenes inserted
    const renderMath = () => {
      if (typeof window.katex === 'undefined') { setTimeout(renderMath, 80); return; }
      stage.querySelectorAll('.block-math').forEach(el => {
        const tex = el.getAttribute('data-latex') || '';
        try { window.katex.render(tex, el, { throwOnError: false, displayMode: true }); }
        catch (e) { el.textContent = tex; }
      });
    };
    renderMath();
  }

  // In phone mode every block is visible immediately on scene-in.
  // When audio plays, .active highlights the block that the narration is on.
  function revealSceneBlocks(sceneEl) {
    sceneEl.querySelectorAll('.scene-kind-badge, .scene-title, .block.pre-reveal').forEach(el => {
      el.classList.remove('pre-reveal');
      el.classList.add('revealed');
    });
  }
  // Update which block is "active" (highlighted) given current audio time.
  // Active = the block whose reveal_at_seconds is the most recent <= t,
  // and the next block's reveal_at_seconds is > t.
  function updateActiveBlock(sceneEl, t) {
    const blocks = Array.from(sceneEl.querySelectorAll('.block'));
    if (!blocks.length) return;
    // Sort by reveal_at_seconds (in case data is out of order)
    const indexed = blocks.map((el, i) => ({
      el,
      r: parseFloat(el.getAttribute('data-reveal-at') || '0'),
      i,
    })).sort((a, b) => a.r - b.r);
    let activeIdx = -1;
    for (let i = 0; i < indexed.length; i++) {
      if (indexed[i].r <= t) activeIdx = i;
      else break;
    }
    blocks.forEach(b => b.classList.remove('active'));
    if (activeIdx >= 0) indexed[activeIdx].el.classList.add('active');
  }
  function clearActiveBlocks(sceneEl) {
    if (!sceneEl) return;
    sceneEl.querySelectorAll('.block.active').forEach(el => el.classList.remove('active'));
  }

  // Track currently-visible scene via IntersectionObserver
  let currentSceneIdx = 0;
  function setupVisibilityObserver() {
    const sceneEls = stage.querySelectorAll('.scene');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
          const idx = Array.from(sceneEls).indexOf(entry.target);
          if (idx >= 0) {
            // Clear highlight from the scene we're leaving
            const prev = sceneEls[currentSceneIdx];
            if (prev && prev !== entry.target) clearActiveBlocks(prev);
            currentSceneIdx = idx;
            revealSceneBlocks(entry.target);
            updateUI();
            // Stop any audio when swiping to a new scene
            if (!audio.paused) audio.pause();
          }
        }
      });
    }, { root: stage, threshold: [0.6] });
    sceneEls.forEach(el => observer.observe(el));
  }

  // Floating UI: counter (top-left), speed selector (top-right),
  // play button (bottom-right), progress bar (very bottom).
  function buildPhoneControls() {
    // Counter pill
    const counter = document.createElement('span');
    counter.className = 'phone-counter';
    counter.id = 'phoneCounter';
    counter.textContent = `1 / ${scenes.length}`;
    document.body.appendChild(counter);

    // Speed cycle button — tap to cycle through speeds, persists in localStorage.
    const SPEED_CYCLE = [1, 1.25, 1.5, 2];
    let speedIdx = SPEED_CYCLE.indexOf(parseFloat(localStorage.getItem('phone_playback_speed') || '1'));
    if (speedIdx < 0) speedIdx = 0;
    const speedBtn = document.createElement('button');
    speedBtn.className = 'phone-speed-btn';
    speedBtn.id = 'phoneSpeedBtn';
    speedBtn.title = 'Tap to change speed';
    function updateSpeedBtn() {
      const v = SPEED_CYCLE[speedIdx];
      speedBtn.textContent = `${v}×`;
      speedBtn.classList.toggle('fast', v >= 1.5);
      audio.playbackRate = v;
      localStorage.setItem('phone_playback_speed', String(v));
    }
    updateSpeedBtn();
    speedBtn.addEventListener('click', () => {
      speedIdx = (speedIdx + 1) % SPEED_CYCLE.length;
      updateSpeedBtn();
    });
    document.body.appendChild(speedBtn);

    // Bottom-right play button
    const btn = document.createElement('button');
    btn.className = 'phone-play-btn';
    btn.id = 'phonePlayBtn';
    btn.title = 'Tap to hear narration';
    btn.textContent = '▶';
    document.body.appendChild(btn);

    // Progress bar (slim line at very bottom of viewport)
    const progress = document.createElement('div');
    progress.className = 'phone-progress';
    progress.id = 'phoneProgress';
    document.body.appendChild(progress);

    btn.addEventListener('click', () => {
      if (audio.paused) {
        const scene = scenes[currentSceneIdx];
        const audioFile = scene.audio || `audio_${String(scene.id).padStart(2, '0')}.mp3`;
        if (audio.src.indexOf(audioFile) === -1) audio.src = audioFile;
        audio.playbackRate = SPEED_CYCLE[speedIdx];
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', () => {
      btn.textContent = '❚❚';
      btn.classList.add('playing');
    });
    audio.addEventListener('pause', () => {
      btn.textContent = '▶';
      btn.classList.remove('playing');
    });
    audio.addEventListener('ended', () => {
      btn.textContent = '▶';
      btn.classList.remove('playing');
      progress.style.width = '0%';
      // Clear highlight when narration finishes
      const sceneEls = stage.querySelectorAll('.scene');
      clearActiveBlocks(sceneEls[currentSceneIdx]);
    });
    audio.addEventListener('timeupdate', () => {
      if (audio.duration && isFinite(audio.duration)) {
        progress.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
      }
      const sceneEls = stage.querySelectorAll('.scene');
      const sceneEl = sceneEls[currentSceneIdx];
      if (sceneEl) {
        // Highlight the block the narration is currently on
        updateActiveBlock(sceneEl, audio.currentTime || 0);
      }
    });
  }

  function updateUI() {
    const c = document.getElementById('phoneCounter');
    if (c) c.textContent = `${currentSceneIdx + 1} / ${scenes.length}`;
  }

  // First-time swipe hint
  function showSwipeHint() {
    if (scenes.length < 2) return;
    if (localStorage.getItem('swipe_hint_seen')) return;
    const hint = document.createElement('div');
    hint.className = 'swipe-hint';
    hint.textContent = 'Swipe up ↑ for next scene';
    document.body.appendChild(hint);
    setTimeout(() => hint.remove(), 5000);
    localStorage.setItem('swipe_hint_seen', '1');
  }

  // Boot
  renderAllScenes();
  buildPhoneControls();
  setupVisibilityObserver();
  // Reveal scene 1 immediately (intersection observer fires async)
  setTimeout(() => {
    const first = stage.querySelector('.scene');
    if (first) revealSceneBlocks(first);
  }, 100);
  showSwipeHint();
})();
</script>
</body>
</html>
