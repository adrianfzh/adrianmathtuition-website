<style>/* Style: Slide Deck
 * - Structured, branded, presentation-style

 */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body.style-slide {
  background: #f4ede0;
  color: #2a2a2a;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.player-shell { flex: 1; display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; width: 100%; padding: 0; }
.stage { flex: 1; display: flex; padding: 0; min-height: 75vh; }
.scene {
  width: 100%;
  background: #fff;
  margin: 24px 30px;
  border-radius: 12px;
  box-shadow: 0 6px 28px rgba(120, 95, 60, 0.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.scene::before {
  content: '';
  display: block;
  height: 6px;
  background: linear-gradient(90deg, #d4b896 0%, #c0a380 50%, #d4b896 100%);
}
.scene-kind-badge {
  align-self: flex-start;
  margin: 28px 36px 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  padding: 4px 12px;
  border-radius: 12px;
  background: #faf3e8;
  color: #7a6753;
  border: 1px solid #e0d4bc;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.scene-kind-badge.revealed { opacity: 1; transform: translateY(0); }
.scene-title {
  font-size: 36px;
  font-weight: 700;
  color: #2a2a2a;
  margin: 14px 36px 24px;
  letter-spacing: -0.01em;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
}
.scene-title.revealed { opacity: 1; transform: translateY(0); }
.scene-body { padding: 0 36px 32px; flex: 1; }
/* V2 reveal states */
.block.pre-reveal { opacity: 0; transform: translateY(14px); }
.block { transition: opacity 0.6s ease, transform 0.6s ease; }
.block.revealed { opacity: 1; transform: translateY(0); }
.block-heading {
  font-size: 22px;
  font-weight: 600;
  color: #5a4a33;
  margin: 24px 0 8px;
}
.block-paragraph, .block-bullet { margin: 8px 0; }
.block-list { list-style: none; padding: 0; margin: 12px 0; }
.block-bullet { padding-left: 28px; position: relative; }
.block-bullet::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 11px;
  width: 8px;
  height: 8px;
  background: #d4b896;
  border-radius: 50%;
}
.block-math {
  margin: 20px 0;
  font-size: 22px;
  background: #faf3e8;
  border-radius: 6px;
  padding: 18px;
  border-left: 4px solid #d4b896;
}
.block-callout {
  margin: 18px 0;
  padding: 14px 18px;
  border-radius: 6px;
  font-size: 16px;
}
.block-callout-info { background: #e8f0f6; color: #1f3d5a; border-left: 4px solid #4a7ba8; }
.block-callout-warning { background: #fbeee2; color: #7a3a14; border-left: 4px solid #d96f2f; }
.block-callout-tip { background: #e8f4ec; color: #1f6f3a; border-left: 4px solid #2a8a4a; }
.block-image { margin: 18px 0; }
.block-image img { max-width: 100%; height: auto; border-radius: 6px; }
.img-caption { font-size: 13px; color: #888; text-align: center; margin-top: 6px; }

.controls {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 24px;
  background: #fff;
  border-top: 1px solid #e0d4bc;
  position: sticky; bottom: 0;
}
.controls button {
  background: #faf3e8;
  color: #5a4a33;
  border: 1px solid #d4b896;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
}
.controls button:hover { background: #f0e4cf; }
#playBtn { background: #5a4a33; color: #fff; border-color: #5a4a33; min-width: 48px; }
#playBtn:hover { background: #3a2f1f; }
.scene-counter { font-size: 13px; color: #888; font-weight: 500; }
.title { font-size: 14px; color: #5a4a33; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.seek-wrap { flex: 2; display: flex; align-items: center; }
#seek { width: 100%; accent-color: #d4b896; }
#speed { background: #faf3e8; border: 1px solid #d4b896; padding: 6px 8px; border-radius: 6px; font-family: inherit; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 720px) {
  .scene { margin: 14px 16px; }
  .scene-title { font-size: 24px; margin: 10px 20px 16px; }
  .scene-body { padding: 0 20px 24px; }
  .block-math { font-size: 18px; padding: 12px; }
  .seek-wrap { display: none; }
  .title { display: none; }
}

<script>window.SCENES = {"topic": "Quadratic Functions and Inequalities", "level": "O Level A Math", "scenes": [{"id": 1, "title": "What We'll Cover", "kind": "intro", "narration": "Here's what we'll cover today: Quadratic Graphs with completing the square and finding maximum and minimum values, Applications of Quadratic Functions, Nature of Roots using the discriminant, and Quadratic Inequalities. Let's dive in.", "blocks": [{"type": "heading", "text": "Quadratic Functions and Inequalities", "reveal_at_seconds": 0}, {"type": "bullet", "text": "Quadratic Graphs", "reveal_at_seconds": 2}, {"type": "bullet", "text": "Applications of Quadratic Functions", "reveal_at_seconds": 4}, {"type": "bullet", "text": "Nature of Roots (Using Discriminant)", "reveal_at_seconds": 6}, {"type": "bullet", "text": "Quadratic Inequalities", "reveal_at_seconds": 8}], "duration_hint_sec": 12, "audio": "audio_01.mp3"}, {"id": 2, "title": "Quadratic Graphs – Three Forms", "kind": "concept", "narration": "Quadratics come in three forms. General form gives the y-intercept c. Factorized form gives x-intercepts alpha and beta. Completed square form gives the turning point h comma k. We'll use completing the square to find max and min values.", "blocks": [{"type": "heading", "text": "Quadratic Graphs", "reveal_at_seconds": 0}, {"type": "bullet", "text": "General Form: $y = ax^2 + bx + c$ → Read y-intercept: $c$", "reveal_at_seconds": 3}, {"type": "bullet", "text": "Factorized Form: $y = (x - \\alpha)(x - \\beta)$ → Read x-intercepts: $\\alpha$ and $\\beta$", "reveal_at_seconds": 7}, {"type": "bullet", "text": "Completed Square Form: $y = a(x - h)^2 + k$ → Read turning point $(h, k)$", "reveal_at_seconds": 11}], "duration_hint_sec": 15, "audio": "audio_02.mp3"}, {"id": 3, "title": "Example 1(a) – Completing the Square", "kind": "example", "narration": "Example one part a: Express minus x squared plus six x minus fourteen in completed square form. Factor out the negative, complete the square for x squared minus six x, then simplify. We get minus the quantity x minus three squared minus five.", "blocks": [{"type": "heading", "text": "Example 1(a): Express $-x^2 + 6x - 14$ in the form $a(x + b)^2 + c$", "reveal_at_seconds": 0}, {"type": "math", "latex": "y = -x^2 + 6x - 14", "reveal_at_seconds": 3}, {"type": "math", "latex": "= -(x^2 - 6x + 14)", "reveal_at_seconds": 5}, {"type": "math", "latex": "= -\\left[ x^2 - 6x + \\left(\\frac{6}{2}\\right)^2 - \\left(\\frac{6}{2}\\right)^2 + 14 \\right]", "reveal_at_seconds": 7}, {"type": "math", "latex": "= -[(x - 3)^2 + 5]", "reveal_at_seconds": 11}, {"type": "math", "latex": "= -(x - 3)^2 - 5", "reveal_at_seconds": 13}], "duration_hint_sec": 16, "audio": "audio_03.mp3"}, {"id": 4, "title": "Example 1(a) – Second Expression", "kind": "example", "narration": "Now express three x squared plus twelve x plus thirteen. Factor out three, complete the square inside, then simplify. We get three times the quantity x plus two squared plus one.", "blocks": [{"type": "heading", "text": "Example 1(a): Express $3x^2 + 12x + 13$ in the form $a(x + b)^2 + c$", "reveal_at_seconds": 0}, {"type": "math", "latex": "y = 3x^2 + 12x + 13", "reveal_at_seconds": 2}, {"type": "math", "latex": "= 3\\left(x^2 + 4x + \\frac{13}{3}\\right)", "reveal_at_seconds": 4}, {"type": "math", "latex": "= 3\\left[ x^2 + 4x + \\left(\\frac{4}{2}\\right)^2 - \\left(\\frac{4}{2}\\right)^2 + \\frac{13}{3} \\right]", "reveal_at_seconds": 7}, {"type": "math", "latex": "= 3\\left[ (x + 2)^2 + \\frac{1}{3} \\right]", "reveal_at_seconds": 11}, {"type": "math", "latex": "= 3(x + 2)^2 + 1", "reveal_at_seconds": 13}], "duration_hint_sec": 15, "audio": "audio_04.mp3"}, {"id": 5, "title": "Example 1(b) – Graphs Will Not Intersect", "kind": "example", "narration": "Part b: use your answers to explain why the two curves will not intersect. The first curve has a maximum at three comma negative five. The second has a minimum at negative two comma one. Since the minimum y-coordinate is greater than the maximum y-coordinate, the curves do not intersect.", "blocks": [{"type": "heading", "text": "Example 1(b): Explain why the curves will not intersect", "reveal_at_seconds": 0}, {"type": "bullet", "text": "$y = -(x-3)^2 - 5$ has maximum point $(3, -5)$", "reveal_at_seconds": 3}, {"type": "bullet", "text": "$y = 3(x+2)^2 + 1$ has minimum point $(-2, 1)$", "reveal_at_seconds": 7}, {"type": "callout", "text": "Since the y-coordinate of the minimum point (1) is greater than the y-coordinate of the maximum point (−5), the two graphs will not intersect.", "kind": "info", "reveal_at_seconds": 11}], "duration_hint_sec": 16, "audio": "audio_05.mp3"}, {"id": 6, "title": "Applications – Stone Height Problem", "kind": "concept", "narration": "Example two models a stone's height h as negative a x squared plus x plus two over five, where x is horizontal distance. We'll complete the square to find the maximum height and interpret the constant term.", "blocks": [{"type": "heading", "text": "Applications of Quadratic Functions", "reveal_at_seconds": 0}, {"type": "bullet", "text": "The height $h$ metres of a stone: $h = -ax^2 + x + \\frac{2}{5}$", "reveal_at_seconds": 3}, {"type": "bullet", "text": "where $x$ is horizontal distance in metres and $a$ is a constant", "reveal_at_seconds": 7}], "duration_hint_sec": 10, "audio": "audio_06.mp3"}, {"id": 7, "title": "Example 2(a) – Find a and Horizontal Distance", "kind": "example", "narration": "Part a: given max height is two point four metres, find a and the horizontal distance. Complete the square for h equals negative a x squared plus x plus two fifths. The max point is one over two a comma one over four a plus two fifths. Set one over four a plus two fifths equal to two point four to solve for a. We get a equals one eighth. The horizontal distance is four metres.", "blocks": [{"type": "heading", "text": "Example 2(a): Find $a$ and horizontal distance at max height 2.4 m", "reveal_at_seconds": 0}, {"type": "math", "latex": "h = -ax^2 + x + \\frac{2}{5} = -a\\left(x^2 - \\frac{x}{a} - \\frac{2}{5a}\\right)", "reveal_at_seconds": 3}, {"type": "math", "latex": "= -a\\left[\\left(x - \\frac{1}{2a}\\right)^2 - \\frac{1}{4a^2} - \\frac{2}{5a}\\right]", "reveal_at_seconds": 7}, {"type": "math", "latex": "= -a\\left(x - \\frac{1}{2a}\\right)^2 + \\frac{1}{4a} + \\frac{2}{5}", "reveal_at_seconds": 11}, {"type": "math", "latex": "\\text{Max point: } \\left(\\frac{1}{2a}, \\frac{1}{4a} + \\frac{2}{5}\\right)", "reveal_at_seconds": 14}, {"type": "math", "latex": "\\frac{1}{4a} + \\frac{2}{5} = 2.4 \\implies \\frac{1}{4a} = 2 \\implies a = \\frac{1}{8}", "reveal_at_seconds": 17}, {"type": "math", "latex": "\\text{Horizontal distance} = \\frac{1}{2a} = \\frac{1}{2 \\times \\frac{1}{8}} = 4 \\text{ m}", "reveal_at_seconds": 20}], "duration_hint_sec": 23, "audio": "audio_07.mp3"}, {"id": 8, "title": "Example 2(b) – Solve and Interpret", "kind": "example", "narration": "Part b: solve negative one eighth x squared plus x plus two fifths equals zero. Use the quadratic formula. We get x approximately eight point three eight or negative zero point three eight two. Reject the negative value. Eight point three eight metres is the horizontal distance when the stone hits the ground.", "blocks": [{"type": "heading", "text": "Example 2(b): Solve $-ax^2 + x + \\frac{2}{5} = 0$ with $a = \\frac{1}{8}$", "reveal_at_seconds": 0}, {"type": "math", "latex": "-\\frac{1}{8}x^2 + x + \\frac{2}{5} = 0", "reveal_at_seconds": 2}, {"type": "math", "latex": "x = \\frac{-1 \\pm \\sqrt{1^2 - 4\\left(-\\frac{1}{8}\\right)\\left(\\frac{2}{5}\\right)}}{2\\left(-\\frac{1}{8}\\right)} \\approx 8.38 \\text{ or } -0.382", "reveal_at_seconds": 5}, {"type": "callout", "text": "Since distance > 0, reject $x = -0.382$. $x = 8.38$ m represents the horizontal distance when the stone hits the ground.", "kind": "info", "reveal_at_seconds": 11}], "duration_hint_sec": 15, "audio": "audio_08.mp3"}, {"id": 9, "title": "Example 2(c) – Meaning of Constant Term", "kind": "example", "narration": "Part c: explain the meaning of two fifths. The constant is the y-intercept, the value of y when x equals zero. In context, two fifths is the initial height of the stone when the horizontal distance is zero.", "blocks": [{"type": "heading", "text": "Example 2(c): Meaning of $\\frac{2}{5}$ in the equation", "reveal_at_seconds": 0}, {"type": "bullet", "text": "$\\frac{2}{5}$ is the y-intercept (value of $y$ when $x = 0$)", "reveal_at_seconds": 3}, {"type": "callout", "text": "In context: $\\frac{2}{5}$ m is the initial height of the stone at the starting point (when horizontal distance is zero).", "kind": "info", "reveal_at_seconds": 7}], "duration_hint_sec": 11, "audio": "audio_09.mp3"}, {"id": 10, "title": "Nature of Roots – Discriminant Summary", "kind": "concept", "narration": "Nature of roots uses the discriminant b squared minus four a c. If it's positive, two distinct real roots. If zero, one equal root. If negative, no real roots. This tells us how a quadratic intersects the x-axis.", "blocks": [{"type": "heading", "text": "Nature of Roots (Using Discriminant)", "reveal_at_seconds": 0}, {"type": "bullet", "text": "Distinct real roots (2 solutions): $b^2 - 4ac > 0$", "reveal_at_seconds": 4}, {"type": "bullet", "text": "Equal real roots (1 solution): $b^2 - 4ac = 0$", "reveal_at_seconds": 8}, {"type": "bullet", "text": "No real roots (no solutions): $b^2 - 4ac < 0$", "reveal_at_seconds": 12}], "duration_hint_sec": 15, "audio": "audio_10.mp3"}, {"id": 11, "title": "Example 3(a) – Find Smallest p for Real Roots", "kind": "example", "narration": "Example three part a: find the smallest positive integer p such that four times the quantity p x minus four equals x squared has real roots. Rearrange to x squared minus four p x plus sixteen equals zero. For real roots, discriminant greater than or equal to zero. Solve the inequality: we get p greater than or equal to two. So smallest positive integer is two.", "blocks": [{"type": "heading", "text": "Example 3(a): Find smallest positive integer $p$ for real roots", "reveal_at_seconds": 0}, {"type": "math", "latex": "4(px - 4) = x^2 \\implies x^2 - 4px + 16 = 0", "reveal_at_seconds": 3}, {"type": "math", "latex": "a = 1, \\; b = -4p, \\; c = 16", "reveal_at_seconds": 6}, {"type": "math", "latex": "b^2 - 4ac \\geq 0 \\implies (-4p)^2 - 4(1)(16) \\geq 0", "reveal_at_seconds": 9}, {"type": "math", "latex": "16p^2 - 64 \\geq 0 \\implies p^2 - 4 \\geq 0 \\implies (p-2)(p+2) \\geq 0", "reveal_at_seconds": 13}, {"type": "math", "latex": "p \\leq -2 \\text{ or } p \\geq 2", "reveal_at_seconds": 17}, {"type": "callout", "text": "Smallest positive integer: $p = 2$", "kind": "info", "reveal_at_seconds": 19}], "duration_hint_sec": 21, "audio": "audio_11.mp3"}, {"id": 12, "title": "Example 3(a) – Common Mistake", "kind": "pitfall", "narration": "Common mistake: from p squared minus four greater than or equal to zero, students write p greater than or equal to plus or minus two. This is incorrect. You must factorise and sketch the graph to get p less than or equal to negative two or p greater than or equal to two.", "blocks": [{"type": "heading", "text": "Common Mistake", "reveal_at_seconds": 0}, {"type": "callout", "text": "From $p^2 - 4 \\geq 0$, writing $p \\geq \\pm 2$ is WRONG. Must factorise: $(p-2)(p+2) \\geq 0$ then sketch to get $p \\leq -2$ or $p \\geq 2$.", "kind": "warning", "reveal_at_seconds": 3}], "duration_hint_sec": 10, "audio": "audio_12.mp3"}, {"id": 13, "title": "Example 3(b) – Graph Lies Below Line", "kind": "example", "narration": "Part b: find range of m for which y equals m x squared minus four x plus m lies entirely below y equals three. Substitute to get m x squared minus four x plus m minus three equals zero. For the curve to lie below the line with no intersection, discriminant less than zero and m greater than zero. Solve: we get m less than negative one or m greater than four. But m must be positive, so reject m less than negative one.", "blocks": [{"type": "heading", "text": "Example 3(b): Find range of $m$ for curve below line $y = 3$", "reveal_at_seconds": 0}, {"type": "math", "latex": "y = mx^2 - 4x + m \\text{ lies below } y = 3", "reveal_at_seconds": 2}, {"type": "math", "latex": "mx^2 - 4x + m = 3 \\implies mx^2 - 4x + m - 3 = 0", "reveal_at_seconds": 5}, {"type": "math", "latex": "a = m, \\; b = -4, \\; c = m - 3", "reveal_at_seconds": 8}, {"type": "math", "latex": "b^2 - 4ac < 0 \\text{ and } m > 0", "reveal_at_seconds": 10}, {"type": "math", "latex": "(-4)^2 - 4(m)(m-3) < 0 \\implies 16 - 4m^2 + 12m < 0", "reveal_at_seconds": 13}, {"type": "math", "latex": "m^2 - 3m - 4 > 0 \\implies (m-4)(m+1) > 0", "reveal_at_seconds": 16}, {"type": "math", "latex": "m < -1 \\text{ or } m > 4", "reveal_at_seconds": 19}, {"type": "callout", "text": "Since $m > 0$ (upward curve), reject $m < -1$. Answer: $m > 4$", "kind": "info", "reveal_at_seconds": 21}], "duration_hint_sec": 24, "audio": "audio_13.mp3"}, {"id": 14, "title": "Example 4 – Discriminant for Stationary Points", "kind": "example", "narration": "Example four: given y equals negative four thirds x cubed minus the quantity k plus one x squared minus k squared x, find the range of k for which y has two distinct stationary points. Differentiate to get dy dx equals negative four x squared minus two times the quantity k plus one x minus k squared. Set dy dx equal to zero. Rearrange to four x squared plus two k plus two x plus k squared equals zero. For two distinct stationary points, discriminant greater than zero. Solve: we get negative one third less than k less than one.", "blocks": [{"type": "heading", "text": "Example 4: Find range of $k$ for 2 distinct stationary points", "reveal_at_seconds": 0}, {"type": "math", "latex": "y = -\\frac{4}{3}x^3 - (k+1)x^2 - k^2x", "reveal_at_seconds": 2}, {"type": "math", "latex": "\\frac{dy}{dx} = -4x^2 - 2(k+1)x - k^2", "reveal_at_seconds": 5}, {"type": "math", "latex": "\\text{For stationary points: } \\frac{dy}{dx} = 0", "reveal_at_seconds": 8}, {"type": "math", "latex": "-4x^2 - 2(k+1)x - k^2 = 0 \\implies 4x^2 + 2(k+1)x + k^2 = 0", "reveal_at_seconds": 10}, {"type": "math", "latex": "4x^2 + (2k+2)x + k^2 = 0", "reveal_at_seconds": 13}, {"type": "math", "latex": "b^2 - 4ac > 0 \\implies (2k+2)^2 - 4(4)(k^2) > 0", "reveal_at_seconds": 16}, {"type": "math", "latex": "4k^2 + 8k + 4 - 16k^2 > 0 \\implies -12k^2 + 8k + 4 > 0", "reveal_at_seconds": 19}, {"type": "math", "latex": "3k^2 - 2k - 1 < 0 \\implies (3k+1)(k-1) < 0", "reveal_at_seconds": 22}, {"type": "math", "latex": "-\\frac{1}{3} < k < 1", "reveal_at_seconds": 25}], "duration_hint_sec": 27, "audio": "audio_14.mp3"}, {"id": 15, "title": "Example 5 – Show Question", "kind": "example", "narration": "Example five is a show question: show that the quantity m plus one x squared plus the quantity four m plus three x plus two m minus one equals zero has real and distinct roots for all real values of m. We must show b squared minus four a c is greater than zero. Complete the square: discriminant equals eight times the quantity m plus five over four squared plus one half. Since a perfect square is always non-negative, this expression is always positive. Hence real and distinct roots for all m.", "blocks": [{"type": "heading", "text": "Example 5: Show real and distinct roots for all $m$", "reveal_at_seconds": 0}, {"type": "math", "latex": "(m+1)x^2 + (4m+3)x + 2m - 1 = 0", "reveal_at_seconds": 2}, {"type": "math", "latex": "a = m+1, \\; b = 4m+3, \\; c = 2m-1", "reveal_at_seconds": 5}, {"type": "math", "latex": "b^2 - 4ac = (4m+3)^2 - 4(m+1)(2m-1)", "reveal_at_seconds": 8}, {"type": "math", "latex": "= 16m^2 + 24m + 9 - 4(2m^2 + m - 1)", "reveal_at_seconds": 11}, {"type": "math", "latex": "= 16m^2 + 24m + 9 - 8m^2 - 4m + 4 = 8m^2 + 20m + 13", "reveal_at_seconds": 14}, {"type": "math", "latex": "= 8\\left(m^2 + \\frac{5}{2}m + \\frac{13}{8}\\right) = 8\\left[\\left(m + \\frac{5}{4}\\right)^2 + \\frac{1}{16}\\right]", "reveal_at_seconds": 17}, {"type": "math", "latex": "= 8\\left(m + \\frac{5}{4}\\right)^2 + \\frac{1}{2}", "reveal_at_seconds": 20}, {"type": "callout", "text": "Since $\\left(m + \\frac{5}{4}\\right)^2 \\geq 0$ for all $m$, we have $b^2 - 4ac > 0$ for all $m$. Hence real and distinct roots.", "kind": "info", "reveal_at_seconds": 23}], "duration_hint_sec": 27, "audio": "audio_15.mp3"}, {"id": 16, "title": "Inequalities – Two Similar Looking Problems", "kind": "concept", "narration": "Example six shows two similar-looking inequalities. Part a: find range of x. Part b: find range of a for which the inequality holds for all x. The key difference: in part a we solve for x; in part b we use the discriminant because it must hold for all x.", "blocks": [{"type": "heading", "text": "These Two Inequalities Look Alike, But...", "reveal_at_seconds": 0}, {"type": "bullet", "text": "(a) Find range of $x$: $x^2 + x - 2 < 2(x-1)^2$", "reveal_at_seconds": 3}, {"type": "bullet", "text": "(b) Find range of $a$ for which $x^2 + ax - 2 < 2(x-1)^2$ for all real $x$", "reveal_at_seconds": 7}], "duration_hint_sec": 11, "audio": "audio_16.mp3"}, {"id": 17, "title": "Example 6(a) – Solve Inequality for x", "kind": "example", "narration": "Part a: expand and rearrange to x squared minus five x plus four greater than zero. Factorise: the quantity x minus four times the quantity x minus one greater than zero. Sketch the graph. Solution: x less than one or x greater than four.", "blocks": [{"type": "heading", "text": "Example 6(a): Solve $x^2 + x - 2 < 2(x-1)^2$", "reveal_at_seconds": 0}, {"type": "math", "latex": "x^2 + x - 2 < 2x^2 - 4x + 2", "reveal_at_seconds": 2}, {"type": "math", "latex": "-x^2 + 5x - 4 < 0 \\implies x^2 - 5x + 4 > 0", "reveal_at_seconds": 5}, {"type": "math", "latex": "(x-4)(x-1) > 0", "reveal_at_seconds": 8}, {"type": "math", "latex": "x < 1 \\text{ or } x > 4", "reveal_at_seconds": 11}], "duration_hint_sec": 13, "audio": "audio_17.mp3"}, {"id": 18, "title": "Example 6(b) – Find Range of a", "kind": "example", "narration": "Part b: find range of a for which the inequality holds for all x. Rearrange to negative x squared plus the quantity a plus four x minus four less than zero. For this to hold for all x, discriminant less than zero. Expand: a plus four squared minus sixteen less than zero. Simplify: a squared plus eight a less than zero. Factorise: a times the quantity a plus eight less than zero. Solution: negative eight less than a less than zero.", "blocks": [{"type": "heading", "text": "Example 6(b): Find range of $a$ for all real $x$", "reveal_at_seconds": 0}, {"type": "math", "latex": "x^2 + ax - 2 < 2(x-1)^2 \\implies -x^2 + (a+4)x - 4 < 0", "reveal_at_seconds": 3}, {"type": "math", "latex": "\\text{Discriminant} < 0: \\; (a+4)^2 - 4(-1)(-4) < 0", "reveal_at_seconds": 7}, {"type": "math", "latex": "a^2 + 8a + 16 - 16 < 0 \\implies a^2 + 8a < 0", "reveal_at_seconds": 11}, {"type": "math", "latex": "a(a+8) < 0", "reveal_at_seconds": 14}, {"type": "math", "latex": "-8 < a < 0", "reveal_at_seconds": 17}], "duration_hint_sec": 19, "audio": "audio_18.mp3"}, {"id": 19, "title": "Example 7(i) – Show Expression Always Positive", "kind": "example", "narration": "Example seven part i: show that x squared plus p x minus x plus p squared plus two is always positive for all real x. Group as x squared plus the quantity p minus one x plus p squared plus two. Compute discriminant: p minus one squared minus four times one times p squared plus two. Simplify by completing the square: negative three times the quantity p minus one third squared minus twenty. This is always negative. Since the parabola opens upward and has no x-intercepts, the expression is always positive.", "blocks": [{"type": "heading", "text": "Example 7(i): Show $x^2 + px - x + p^2 + 2$ is always positive", "reveal_at_seconds": 0}, {"type": "math", "latex": "x^2 + px - x + p^2 + 2 = x^2 + (p-1)x + p^2 + 2", "reveal_at_seconds": 3}, {"type": "math", "latex": "\\text{Discriminant} = (p-1)^2 - 4(1)(p^2+2)", "reveal_at_seconds": 7}, {"type": "math", "latex": "= p^2 - 2p + 1 - 4p^2 - 8 = -3p^2 - 2p - 7", "reveal_at_seconds": 10}, {"type": "math", "latex": "= -3\\left(p^2 + \\frac{2}{3}p + \\frac{7}{3}\\right) = -3\\left[\\left(p - \\frac{1}{3}\\right)^2 + \\frac{20}{3}\\right]", "reveal_at_seconds": 13}, {"type": "math", "latex": "= -3\\left(p - \\frac{1}{3}\\right)^2 - 20 < 0", "reveal_at_seconds": 17}, {"type": "callout", "text": "Since the graph opens upward and has no x-intercepts, $x^2 + px - x + p^2 + 2$ is positive for all $x$.", "kind": "info", "reveal_at_seconds": 20}], "duration_hint_sec": 23, "audio": "audio_19.mp3"}, {"id": 20, "title": "Example 7(ii) – Find Range for Fraction Negative", "kind": "example", "narration": "Part ii: find range of x for which the fraction x squared minus three x minus twenty eight over x squared plus p x minus x plus p squared plus two is less than zero. Since the denominator is always positive, we need the numerator less than zero. Factor: the quantity x minus seven times the quantity x plus four less than zero. Solution: negative four less than x less than seven.", "blocks": [{"type": "heading", "text": "Example 7(ii): Find range of $x$ for $\\frac{x^2 - 3x - 28}{x^2 + px - x + p^2 + 2} < 0$", "reveal_at_seconds": 0}, {"type": "bullet", "text": "Since denominator $> 0$ for all $x$, we need numerator $< 0$", "reveal_at_seconds": 3}, {"type": "math", "latex": "x^2 - 3x - 28 < 0", "reveal_at_seconds": 7}, {"type": "math", "latex": "(x-7)(x+4) < 0", "reveal_at_seconds": 10}, {"type": "math", "latex": "-4 < x < 7", "reveal_at_seconds": 13}], "duration_hint_sec": 15, "audio": "audio_20.mp3"}, {"id": 21, "title": "Example 8 – Working Backwards from Solution", "kind": "example", "narration": "Example eight: given the solution set of three x squared less than h x plus k is negative two thirds less than x less than two and a half, find h and k. Work backwards: convert to negative seven thirds less than x less than five halves. Multiply to get the factored form: three x plus seven times two x minus five less than zero. Expand to six x squared minus x minus thirty five less than zero. Divide by two: three x squared less than one half x plus thirty five halves. Compare with the original: h equals one half, k equals thirty five halves.", "blocks": [{"type": "heading", "text": "Example 8: Find $h$ and $k$ from solution set", "reveal_at_seconds": 0}, {"type": "math", "latex": "3x^2 < hx + k \\text{ has solution } -2\\frac{1}{3} < x < 2\\frac{1}{2}", "reveal_at_seconds": 2}, {"type": "math", "latex": "-\\frac{7}{3} < x < \\frac{5}{2}", "reveal_at_seconds": 5}, {"type": "math", "latex": "(3x + 7)(2x - 5) < 0 \\implies 6x^2 - x - 35 < 0", "reveal_at_seconds": 8}, {"type": "math", "latex": "6x^2 < x + 35 \\implies 3x^2 < \\frac{1}{2}x + \\frac{35}{2}", "reveal_at_seconds": 12}, {"type": "math", "latex": "\\text{Comparing: } h = \\frac{1}{2}, \\; k = \\frac{35}{2}", "reveal_at_seconds": 16}], "duration_hint_sec": 18, "audio": "audio_21.mp3"}, {"id": 22, "title": "Example 9(i) – Conditions for Curve Above x-axis", "kind": "example", "narration": "Example nine: the curve y equals a x squared plus two c x plus c lies completely above the x-axis. Part i: write down conditions for a and c. First, a must be positive for upward parabola. Second, discriminant less than zero for no x-intercepts. Compute: two c squared minus four a c less than zero. Simplify: four c squared minus four a c less than zero, which gives c squared minus a c less than zero.", "blocks": [{"type": "heading", "text": "Example 9(i): Conditions for $y = ax^2 + 2cx + c$ above x-axis", "reveal_at_seconds": 0}, {"type": "math", "latex": "ax^2 + 2cx + c > 0 \\text{ for all } x", "reveal_at_seconds": 2}, {"type": "bullet", "text": "Condition 1: $a > 0$ (upward parabola)", "reveal_at_seconds": 5}, {"type": "bullet", "text": "Condition 2: Discriminant $< 0$ (no x-intercepts)", "reveal_at_seconds": 8}, {"type": "math", "latex": "(2c)^2 - 4(a)(c) < 0 \\implies 4c^2 - 4ac < 0", "reveal_at_seconds": 11}, {"type": "math", "latex": "c^2 - ac < 0", "reveal_at_seconds": 15}], "duration_hint_sec": 17, "audio": "audio_22.mp3"}, {"id": 23, "title": "Example 9(ii) – Give Example Values", "kind": "example", "narration": "Part ii: give example values for a and c that satisfy the conditions. Any values where a is positive and c squared minus a c is negative work. For instance, a equals one and c equals one half.", "blocks": [{"type": "heading", "text": "Example 9(ii): Example values for $a$ and $c$", "reveal_at_seconds": 0}, {"type": "callout", "text": "Any values satisfying $a > 0$ and $c^2 - ac < 0$ work. Example: $a = 1$, $c = \\frac{1}{2}$", "kind": "info", "reveal_at_seconds": 3}], "duration_hint_sec": 7, "audio": "audio_23.mp3"}, {"id": 24, "title": "Recap and Next Steps", "kind": "outro", "narration": "Let's recap. We covered completing the square to find turning points, applications with real-world context, using the discriminant to determine the nature of roots, and solving quadratic inequalities. Practice the examples in the problem set, especially working backwards and show questions. Keep drilling discriminant conditions.", "blocks": [{"type": "heading", "text": "Summary", "reveal_at_seconds": 0}, {"type": "bullet", "text": "Completing the square → max/min values", "reveal_at_seconds": 3}, {"type": "bullet", "text": "Applications → interpret constants and turning points in context", "reveal_at_seconds": 6}, {"type": "bullet", "text": "Discriminant → number of roots and inequalities for all x", "reveal_at_seconds": 9}, {"type": "bullet", "text": "Quadratic inequalities → factorise and sketch", "reveal_at_seconds": 12}, {"type": "callout", "text": "Next: Work through the practice questions on page 7. Focus on show questions and working backwards problems.", "kind": "tip", "reveal_at_seconds": 15}], "duration_hint_sec": 18, "audio": "audio_24.mp3"}], "voice": "Rachel", "total_scenes": 24, "voice_id": "rOVKXrU0YcQMzmTNwaDq", "voice_model": "eleven_multilingual_v2", "tts_total_chars": 7858};</script>
<script>// Web-native video player. Loads window.SCENES (set by build_html.py),
// renders each scene's blocks, plays its audio, auto-advances to next scene
// when audio ends. KaTeX renders math in `latex` blocks.

(function () {
  const scenes = (window.SCENES && Array.isArray(window.SCENES.scenes)) ? window.SCENES.scenes : [];
  if (!scenes.length) {
    document.getElementById('stage').innerHTML = '<div class="error">No scenes found.</div>';
    return;
  }
  const stage = document.getElementById('stage');
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counterEl = document.getElementById('sceneCounter');
  const titleEl = document.getElementById('sceneTitle');
  const seekEl = document.getElementById('seek');
  const speedEl = document.getElementById('speed');

  let idx = 0;
  let isPlaying = false;

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function renderBlock(block, sceneId, blockIdx) {
    if (!block || !block.type) return '';
    // V2: every block gets data-reveal-at + starts in .pre-reveal state.
    // The player flips them to .revealed as audio.currentTime crosses reveal_at_seconds.
    const r = (typeof block.reveal_at_seconds === 'number' ? block.reveal_at_seconds : 0);
    const dataAttr = `data-reveal-at="${r}"`;
    if (block.type === 'heading') return `<h2 class="block block-heading pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</h2>`;
    if (block.type === 'bullet') return `<li class="block block-bullet pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</li>`;
    if (block.type === 'callout') {
      const kind = block.kind || 'info';
      return `<div class="block block-callout block-callout-${kind} pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</div>`;
    }
    if (block.type === 'math') {
      return `<div class="block block-math pre-reveal" ${dataAttr} data-latex="${escapeHtml(block.latex || '')}"></div>`;
    }
    if (block.type === 'image') {
      const cap = block.caption ? `<div class="img-caption">${escapeHtml(block.caption)}</div>` : '';
      return `<figure class="block block-image pre-reveal" ${dataAttr}><img src="${escapeHtml(block.src)}" alt="${escapeHtml(block.caption || '')}">${cap}</figure>`;
    }
    if (block.type === 'paragraph' || block.type === 'text') {
      return `<p class="block block-paragraph pre-reveal" ${dataAttr}>${escapeHtml(block.text || '')}</p>`;
    }
    return '';
  }

  function renderScene(scene) {
    const blocks = Array.isArray(scene.blocks) ? scene.blocks : [];
    // Group consecutive bullets into a single <ul>
    let html = '';
    let inList = false;
    blocks.forEach((b, i) => {
      const isBullet = b && b.type === 'bullet';
      if (isBullet && !inList) { html += '<ul class="block-list">'; inList = true; }
      if (!isBullet && inList) { html += '</ul>'; inList = false; }
      html += renderBlock(b, scene.id, i);
    });
    if (inList) html += '</ul>';

    stage.innerHTML = `
      <div class="scene scene-${scene.kind || 'concept'}" data-scene-id="${scene.id}">
        <div class="scene-kind-badge">${escapeHtml((scene.kind || '').toUpperCase())}</div>
        <h1 class="scene-title">${escapeHtml(scene.title || '')}</h1>
        <div class="scene-body">${html}</div>
      </div>
    `;

    // Render KaTeX in math blocks (deferred until KaTeX has loaded)
    const renderMath = () => {
      if (typeof window.katex === 'undefined') {
        setTimeout(renderMath, 80);
        return;
      }
      stage.querySelectorAll('.block-math').forEach(el => {
        const tex = el.getAttribute('data-latex') || '';
        try {
          window.katex.render(tex, el, { throwOnError: false, displayMode: true });
        } catch (e) {
          el.textContent = tex;
        }
      });
    };
    renderMath();
    // Always reveal scene title + kind badge on scene load (they're not in blocks)
    requestAnimationFrame(() => {
      stage.querySelectorAll('.scene-kind-badge, .scene-title').forEach(el => {
        el.classList.add('revealed');
      });
    });

    titleEl.textContent = scene.title || '';
    counterEl.textContent = `${scene.id} / ${scenes.length}`;
  }

  function loadAndPlay(targetIdx, autoplay) {
    if (targetIdx < 0 || targetIdx >= scenes.length) return;
    idx = targetIdx;
    const scene = scenes[idx];
    renderScene(scene);
    _fallbackStart = performance.now();
    const audioFile = scene.audio || `audio_${String(scene.id).padStart(2, '0')}.mp3`;
    audio.src = audioFile;
    audio.playbackRate = parseFloat(speedEl.value || '1');
    setTimeout(() => revealBlocksAtTime(0), 50);
    // Show "no audio" banner only if the <audio> element itself errors.
    // (Don't HEAD-probe — file:// fetch is unreliable across browsers and
    //  produces false positives even when audio actually plays.)
    if (autoplay) {
      audio.play().catch(err => {
        console.warn('Autoplay blocked — user must click play.', err);
        setPlay(false);
        startFallbackTimer();
      });
    } else {
      startFallbackTimer();
    }
  }

  function showNoAudioBanner() {
    let b = document.getElementById('no-audio-banner');
    if (b) return;
    b = document.createElement('div');
    b.id = 'no-audio-banner';
    b.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#fbeeee;color:#7a2a2a;border:1px solid #d4a4a4;padding:10px 18px;border-radius:6px;font-size:13px;z-index:1000;font-family:system-ui,sans-serif;max-width:520px;text-align:center;';
    b.innerHTML = '⚠ <strong>No narration audio found.</strong> Run <code>python pipeline/tts_render.py</code> after setting <code>ELEVENLABS_API_KEY</code> in <code>.env</code>, then re-open this page. (Visuals are still playing on a fallback timer so you can preview the style.)';
    document.body.appendChild(b);
    // Fade out after 12s so it doesn't block forever
    setTimeout(() => { b.style.transition = 'opacity 1s'; b.style.opacity = '0'; setTimeout(() => b.remove(), 1100); }, 12000);
  }

  function setPlay(state) {
    isPlaying = state;
    playBtn.textContent = state ? '❚❚' : '▶';
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });
  audio.addEventListener('play', () => setPlay(true));
  audio.addEventListener('pause', () => setPlay(false));
  audio.addEventListener('ended', () => {
    if (idx < scenes.length - 1) {
      loadAndPlay(idx + 1, true);
    } else {
      setPlay(false);
      counterEl.textContent = '✓ Done';
    }
  });
  audio.addEventListener('timeupdate', () => {
    if (audio.duration && isFinite(audio.duration)) {
      seekEl.value = (audio.currentTime / audio.duration) * 100;
    }
    revealBlocksAtTime(audio.currentTime || 0);
  });

  // Reveal blocks whose data-reveal-at <= current audio time
  function revealBlocksAtTime(t) {
    stage.querySelectorAll('.block.pre-reveal').forEach(el => {
      const r = parseFloat(el.getAttribute('data-reveal-at') || '0');
      if (r <= t) {
        el.classList.remove('pre-reveal');
        el.classList.add('revealed');
      }
    });
  }

  // Fallback: if audio is missing or fails to load, run a wall-clock timer
  // from when the scene loaded so reveals still happen for preview.
  let _fallbackStart = 0;
  let _fallbackTimer = null;
  function startFallbackTimer() {
    _fallbackStart = performance.now();
    if (_fallbackTimer) clearInterval(_fallbackTimer);
    _fallbackTimer = setInterval(() => {
      // Only run fallback if audio isn't actually playing
      if (!audio.paused && audio.duration && isFinite(audio.duration)) return;
      const elapsed = (performance.now() - _fallbackStart) / 1000;
      revealBlocksAtTime(elapsed);
    }, 200);
  }
  audio.addEventListener('error', () => { showNoAudioBanner(); startFallbackTimer(); });
  audio.addEventListener('stalled', startFallbackTimer);
  // Belt-and-braces: if audio has no duration after 1.2 sec post-load, kick the fallback.
  audio.addEventListener('loadstart', () => {
    setTimeout(() => {
      if (!audio.duration || !isFinite(audio.duration)) startFallbackTimer();
    }, 1200);
  });
  // Also start fallback when user clicks Play manually but audio isn't loadable.
  // Keeps the auto-advance working in the silent preview.
  function tickFallbackOnce() {
    const elapsed = (performance.now() - _fallbackStart) / 1000;
    revealBlocksAtTime(elapsed);
    // Auto-advance using duration_hint_sec if no audio
    const scene = scenes[idx];
    const hint = (scene && scene.duration_hint_sec) || 30;
    if (elapsed >= hint && (!audio.duration || !isFinite(audio.duration))) {
      if (idx < scenes.length - 1) loadAndPlay(idx + 1, !audio.paused);
      else { setPlay(false); counterEl.textContent = '✓ Done'; }
    }
  }
  setInterval(tickFallbackOnce, 250);
  seekEl.addEventListener('input', () => {
    if (audio.duration && isFinite(audio.duration)) {
      audio.currentTime = (seekEl.value / 100) * audio.duration;
    }
  });
  speedEl.addEventListener('change', () => {
    audio.playbackRate = parseFloat(speedEl.value || '1');
  });
  prevBtn.addEventListener('click', () => loadAndPlay(idx - 1, !audio.paused));
  nextBtn.addEventListener('click', () => loadAndPlay(idx + 1, !audio.paused));
  document.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) return;
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    else if (e.key === 'ArrowLeft') prevBtn.click();
    else if (e.key === 'ArrowRight') nextBtn.click();
  });

  // Boot
  loadAndPlay(0, false);
})();
</script>
</body>
</html>
