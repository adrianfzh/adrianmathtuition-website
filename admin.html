<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Invoice Review — Adrian's Math Tuition</title>
    <style>
        html { font-size: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-size: inherit; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }

        /* Login overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-card h1 {
            font-size: 22px;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .login-card p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 28px;
        }

        #pw-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            font-family: inherit;
            text-align: center;
            letter-spacing: 0.1em;
        }

        #pw-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        #pw-error {
            font-size: 13px;
            color: #dc2626;
            margin-bottom: 12px;
            display: none;
        }

        #pw-btn {
            width: 100%;
            padding: 11px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

        #pw-btn:hover:not(:disabled) { background: #5568d3; }
        #pw-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-6px); }
            80%       { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .header-left p {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #summary {
            font-size: 17px;
            color: #475569;
        }

        #summary strong { color: #0f172a; }

        .btn-refresh {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-refresh:hover { background: #f1f5f9; }

        /* Content */
        .content {
            max-width: 860px;
            margin: 32px auto;
            padding: 0 20px;
        }

        /* Error banner */
        .error-banner {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .btn-retry {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: #64748b;
        }

        .empty-state .emoji { font-size: 40px; margin-bottom: 16px; }
        .empty-state h2 { font-size: 18px; color: #334155; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        /* Invoice card */
        .invoice-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }

        .invoice-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

        .invoice-card.approved { opacity: 0.7; }

        .card-body { padding: 30px; }

        /* Top row */
        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .student-name {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
        }

        .invoice-month {
            font-size: 15px;
            color: #64748b;
            flex: 1;
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge-draft { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
        .badge-approved { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

        /* Amounts */
        .amounts { margin-bottom: 12px; }

        .amount-line {
            font-size: 16px;
            color: #475569;
            margin-bottom: 4px;
        }

        .amount-adjustment {
            font-size: 14px;
            color: #64748b;
        }

        .final-amount {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 6px;
        }

        /* Auto notes */
        .auto-notes {
            background: #f8fafc;
            border-left: 3px solid #cbd5e1;
            border-radius: 0 6px 6px 0;
            padding: 10px 14px;
            font-size: 14px;
            color: #475569;
            font-style: italic;
            white-space: pre-wrap;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        /* Card actions */
        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-preview {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #475569;
        }

        .btn-preview:hover:not(:disabled) { background: #f1f5f9; }

        .btn-amend {
            background: #fffbeb;
            border-color: #fcd34d;
            color: #92400e;
        }

        .btn-amend:hover:not(:disabled) { background: #fef3c7; }

        .btn-approve {
            background: #f0fdf4;
            border-color: #86efac;
            color: #15803d;
        }

        .btn-approve:hover:not(:disabled) { background: #dcfce7; }

        .btn-save {
            background: #1e40af;
            color: white;
            border-color: #1e40af;
        }

        .btn-save:hover:not(:disabled) { background: #1d3fa3; }

        .btn-cancel {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #64748b;
        }

        .btn-cancel:hover { background: #f1f5f9; }

        .inline-confirm {
            font-size: 14px;
            color: #15803d;
            font-weight: 500;
            padding: 8px 0;
        }

        /* Amend form */
        .amend-form {
            border-top: 1px solid #f1f5f9;
            padding: 24px 30px;
            background: #fafbfc;
            display: none;
        }

        .amend-form.open { display: block; }

        .amend-form h3 {
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 13px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #0f172a;
            background: white;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148,163,184,0.15);
        }

        .form-group input[readonly] {
            background: #f8fafc;
            color: #64748b;
        }

        .form-group.full-width { grid-column: 1 / -1; }

        .live-calc {
            font-size: 15px;
            color: #334155;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-weight: 500;
        }

        .form-actions {
            display: flex;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .card-top { flex-direction: column; align-items: flex-start; gap: 6px; }
        }
    </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
    <div class="login-card">
        <h1>📋 Invoice Review</h1>
        <p>Enter the admin password to continue</p>
        <input type="password" id="pw-input" placeholder="Password"
            onkeydown="if(event.key==='Enter') submitPassword()">
        <div id="pw-error"></div>
        <button id="pw-btn" onclick="submitPassword()">Submit</button>
    </div>
</div>

<div class="header">
    <div class="header-left">
        <h1>📋 Invoice Review</h1>
        <p>Review and approve draft invoices before sending</p>
    </div>
    <div class="header-right">
        <span id="summary"></span>
        <button class="btn-refresh" onclick="loadInvoices()">🔄 Refresh</button>
    </div>
</div>

<div class="content">
    <div id="error-banner" class="error-banner" style="display:none;">
        <span id="error-msg"></span>
        <button class="btn-retry" onclick="loadInvoices()">Retry</button>
    </div>
    <div id="invoices-container"></div>
</div>

<script>
    let adminPassword = sessionStorage.getItem('adminPassword') || '';
    let invoices = [];

    function authHeaders(extra = {}) {
        return { 'Authorization': `Bearer ${adminPassword}`, ...extra };
    }

    // --- Auth ---

    function init() {
        if (sessionStorage.getItem('adminAuthed') === '1' && adminPassword) {
            document.getElementById('login-overlay').style.display = 'none';
            loadInvoices();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('pw-input').focus();
        }
    }

    async function submitPassword() {
        const input = document.getElementById('pw-input');
        const errorEl = document.getElementById('pw-error');
        const btn = document.getElementById('pw-btn');
        const pw = input.value;

        btn.disabled = true;
        btn.textContent = 'Checking…';
        errorEl.style.display = 'none';

        try {
            const res = await fetch('/api/admin-invoices?auth=check', {
                headers: { 'Authorization': `Bearer ${pw}` },
            });

            if (res.ok) {
                adminPassword = pw;
                sessionStorage.setItem('adminAuthed', '1');
                sessionStorage.setItem('adminPassword', pw);
                document.getElementById('login-overlay').style.display = 'none';
                loadInvoices();
            } else {
                input.classList.remove('shake');
                void input.offsetWidth; // reflow to restart animation
                input.classList.add('shake');
                errorEl.textContent = 'Incorrect password';
                errorEl.style.display = 'block';
                input.value = '';
                input.focus();
            }
        } catch (err) {
            errorEl.textContent = 'Connection error. Try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit';
        }
    }

    // --- Data ---

    async function loadInvoices() {
        document.getElementById('error-banner').style.display = 'none';
        document.getElementById('invoices-container').innerHTML =
            '<p style="color:#94a3b8;text-align:center;padding:48px 0;font-size:14px;">Loading...</p>';

        try {
            const res = await fetch('/api/admin-invoices', {
                headers: authHeaders(),
            });
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            invoices = await res.json();
            renderAll();
        } catch (err) {
            document.getElementById('error-msg').textContent = err.message;
            document.getElementById('error-banner').style.display = 'flex';
            document.getElementById('invoices-container').innerHTML = '';
        }
    }

    // --- Render ---

    function renderAll() {
        updateSummary();

        const container = document.getElementById('invoices-container');

        if (invoices.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">📭</div>
                    <h2>No invoices found</h2>
                    <p>No draft or approved invoices at the moment.<br>The cron runs on the 14th at 9am SGT to generate them.</p>
                </div>`;
            return;
        }

        // Drafts first, then Approved; within each group sort by studentName
        const sorted = [...invoices].sort((a, b) => {
            if (a.status === b.status) return a.studentName.localeCompare(b.studentName);
            return a.status === 'Draft' ? -1 : 1;
        });

        container.innerHTML = sorted.map(inv => renderCard(inv)).join('');
    }

    function updateSummary() {
        const drafts = invoices.filter(i => i.status === 'Draft');
        const total = drafts.reduce((s, i) => s + (i.finalAmount || 0), 0);
        const el = document.getElementById('summary');
        if (drafts.length === 0) {
            el.innerHTML = 'No draft invoices';
        } else {
            el.innerHTML = `<strong>${drafts.length}</strong> draft invoice${drafts.length !== 1 ? 's' : ''} · Total: <strong>$${total.toFixed(2)}</strong>`;
        }
    }

    function renderCard(inv) {
        const isDraft = inv.status === 'Draft';
        const badgeClass = isDraft ? 'badge-draft' : 'badge-approved';
        const badgeLabel = isDraft ? 'Draft' : 'Approved';

        const baseLine = `${inv.lessonsCount} lesson${inv.lessonsCount !== 1 ? 's' : ''} × $${inv.ratePerLesson.toFixed(2)} = $${inv.baseAmount.toFixed(2)}`;

        let adjLine = '';
        if (inv.adjustmentAmount !== null && inv.adjustmentAmount !== 0) {
            const sign = inv.adjustmentAmount > 0 ? '+' : '−';
            const absAmt = Math.abs(inv.adjustmentAmount).toFixed(2);
            const reason = inv.adjustmentNotes ? ` (${inv.adjustmentNotes})` : '';
            adjLine = `<div class="amount-adjustment">${sign} $${absAmt}${reason}</div>`;
        }

        const notesHtml = inv.autoNotes
            ? `<div class="auto-notes">${escHtml(inv.autoNotes)}</div>`
            : '';

        const actionsHtml = isDraft ? `
            <div class="card-actions" id="actions-${inv.id}">
                <button class="btn btn-preview" onclick="previewPdf('${inv.id}', '${escAttr(inv.pdfUrl || '')}')">👁 Preview PDF</button>
                <button class="btn btn-amend" onclick="toggleAmend('${inv.id}')">✏️ Amend</button>
                <button class="btn btn-approve" onclick="approveInvoice('${inv.id}')">✅ Approve</button>
            </div>` : '';

        const amendForm = isDraft ? renderAmendForm(inv) : '';

        return `
        <div class="invoice-card${isDraft ? '' : ' approved'}" id="card-${inv.id}">
            <div class="card-body">
                <div class="card-top">
                    <span class="student-name">${escHtml(inv.studentName)}</span>
                    <span class="invoice-month">${escHtml(inv.month)}</span>
                    <span class="badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="amounts">
                    <div class="amount-line">${baseLine}</div>
                    ${adjLine}
                    <div class="final-amount">$${inv.finalAmount.toFixed(2)}</div>
                </div>
                ${notesHtml}
                ${actionsHtml}
            </div>
            ${amendForm}
        </div>`;
    }

    function renderAmendForm(inv) {
        return `
        <div class="amend-form" id="amend-${inv.id}">
            <h3>✏️ Amend Invoice</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Lessons Count</label>
                    <input type="number" id="a-lessons-${inv.id}" value="${inv.lessonsCount}" min="0"
                        oninput="updateCalc('${inv.id}')">
                </div>
                <div class="form-group">
                    <label>Rate Per Lesson</label>
                    <input type="text" value="$${inv.ratePerLesson.toFixed(2)}" readonly>
                </div>
                <div class="form-group">
                    <label>Adjustment Amount</label>
                    <input type="number" id="a-adj-${inv.id}" value="${inv.adjustmentAmount || ''}"
                        placeholder="0" step="0.01" oninput="updateCalc('${inv.id}')">
                </div>
                <div class="form-group">
                    <label>Adjustment Notes</label>
                    <input type="text" id="a-adjnotes-${inv.id}" value="${escAttr(inv.adjustmentNotes || '')}"
                        placeholder="e.g. Additional lesson, discount">
                </div>
                <div class="form-group full-width">
                    <label>Auto Notes</label>
                    <textarea id="a-notes-${inv.id}" rows="3">${escHtml(inv.autoNotes || '')}</textarea>
                </div>
            </div>
            <div class="live-calc" id="calc-${inv.id}">${calcDisplay(inv.lessonsCount, inv.ratePerLesson, inv.adjustmentAmount || 0)}</div>
            <div class="form-actions">
                <button class="btn btn-save" onclick="saveAmend('${inv.id}', ${inv.ratePerLesson})">💾 Save Changes</button>
                <button class="btn btn-cancel" onclick="toggleAmend('${inv.id}')">Cancel</button>
            </div>
        </div>`;
    }

    function calcDisplay(lessons, rate, adj) {
        const base = lessons * rate;
        const final = base + (adj || 0);
        const adjStr = (adj && adj !== 0)
            ? ` ${adj > 0 ? '+' : '−'} $${Math.abs(adj).toFixed(2)}`
            : '';
        return `(${lessons} × $${rate.toFixed(2)})${adjStr} = <strong>$${final.toFixed(2)}</strong>`;
    }

    function updateCalc(id) {
        const inv = invoices.find(i => i.id === id);
        if (!inv) return;
        const lessons = parseFloat(document.getElementById(`a-lessons-${id}`)?.value) || 0;
        const adj = parseFloat(document.getElementById(`a-adj-${id}`)?.value) || 0;
        const el = document.getElementById(`calc-${id}`);
        if (el) el.innerHTML = calcDisplay(lessons, inv.ratePerLesson, adj);
    }

    function toggleAmend(id) {
        const form = document.getElementById(`amend-${id}`);
        if (form) form.classList.toggle('open');
    }

    function previewPdf(id, pdfUrl) {
        if (!pdfUrl) {
            alert('PDF not yet generated for this invoice.');
            return;
        }
        window.open(pdfUrl, '_blank');
    }

    async function approveInvoice(id) {
        const actionsEl = document.getElementById(`actions-${id}`);
        if (!actionsEl) return;

        actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);

        try {
            const res = await fetch('/api/admin-invoices', {
                method: 'PATCH',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ recordId: id, fields: { 'Status': 'Approved' } }),
            });
            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            const inv = invoices.find(i => i.id === id);
            if (inv) inv.status = 'Approved';

            actionsEl.innerHTML = '<span class="inline-confirm">✅ Approved</span>';
            updateSummary();

            setTimeout(() => {
                const card = document.getElementById(`card-${id}`);
                if (card && inv) card.outerHTML = renderCard(inv);
            }, 1200);

        } catch (err) {
            actionsEl.querySelectorAll('button').forEach(b => b.disabled = false);
            alert('Failed to approve: ' + err.message);
        }
    }

    async function saveAmend(id, ratePerLesson) {
        const lessonsCount = parseInt(document.getElementById(`a-lessons-${id}`).value) || 0;
        const adjustmentAmount = parseFloat(document.getElementById(`a-adj-${id}`).value) || 0;
        const adjustmentNotes = document.getElementById(`a-adjnotes-${id}`).value.trim();
        const autoNotes = document.getElementById(`a-notes-${id}`).value;
        const baseAmount = lessonsCount * ratePerLesson;
        const finalAmount = baseAmount + adjustmentAmount;

        const fields = {
            'Lessons Count': lessonsCount,
            'Base Amount': baseAmount,
            'Final Amount': finalAmount,
            'Auto Notes': autoNotes,
        };
        if (adjustmentAmount !== 0) {
            fields['Adjustment Amount'] = adjustmentAmount;
            if (adjustmentNotes) fields['Adjustment Notes'] = adjustmentNotes;
        }

        const saveBtn = document.querySelector(`#amend-${id} .btn-save`);
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }

        try {
            const res = await fetch('/api/admin-invoices', {
                method: 'PATCH',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ recordId: id, fields }),
            });
            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            const inv = invoices.find(i => i.id === id);
            if (inv) {
                inv.lessonsCount = lessonsCount;
                inv.baseAmount = baseAmount;
                inv.adjustmentAmount = adjustmentAmount || null;
                inv.adjustmentNotes = adjustmentNotes || null;
                inv.finalAmount = finalAmount;
                inv.autoNotes = autoNotes;
            }

            const card = document.getElementById(`card-${id}`);
            if (card && inv) card.outerHTML = renderCard(inv);
            updateSummary();

        } catch (err) {
            if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Save Changes'; }
            alert('Failed to save: ' + err.message);
        }
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escAttr(str) {
        return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    init();
</script>
</body>
</html>
