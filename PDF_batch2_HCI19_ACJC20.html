function b2u(b){const x=atob(b),a=new Uint8Array(x.length);for(let i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a;}
async function go(){const k=document.getElementById('k').value.trim();if(!k){alert('paste key');return;}
const log=document.getElementById('log');log.innerHTML='';let ok=0;
