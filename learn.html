<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn — Adrian's Math Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script defer src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --background: hsl(210, 20%, 98%);
            --foreground: hsl(220, 40%, 13%);
            --card: hsl(0, 0%, 100%);
            --primary: hsl(220, 60%, 20%);
            --primary-foreground: hsl(45, 100%, 96%);
            --muted: hsl(220, 15%, 93%);
            --muted-foreground: hsl(220, 10%, 46%);
            --border: hsl(220, 15%, 88%);
            --radius: 0.75rem;
            --font: 'DM Sans', sans-serif;
            --font-display: 'DM Serif Display', serif;
            --step-blue: #2563eb;
        }

        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--foreground);
            font-size: 17px;
            line-height: 1.75;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── NAV ── */
        nav {
            z-index: 50;
            background: hsla(0, 0%, 100%, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .nav-container {
            max-width: 1152px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--muted-foreground);
            text-decoration: none;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .back-link:hover { color: var(--primary); }

        .nav-topic {
            font-family: var(--font-display);
            font-size: 17px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-subject {
            font-size: 12px;
            color: var(--muted-foreground);
            background: var(--muted);
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── SCROLL AREA ── */
        .lesson-scroll {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .lesson-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 24px 8px;
        }

        /* ── MESSAGES ── */
        .message-group {
            margin-bottom: 24px;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-group.user { display: flex; justify-content: flex-end; }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 17px;
            line-height: 1.7;
        }

        .message-group.user .message-bubble {
            background: var(--primary);
            color: var(--primary-foreground);
            border-bottom-right-radius: 4px;
            max-width: 78%;
        }

        .message-group.bot .message-bubble {
            background: var(--background);
            border: none;
            border-bottom-left-radius: 4px;
            color: var(--foreground);
            max-width: 100%;
            padding-left: 0;
        }

        .message-bubble .katex { font-size: 1.05em; }
        .message-bubble .katex-display { margin: 12px 0; overflow-x: auto; }
        .message-bubble strong { font-weight: 600; }

        /* Typing */
        .typing-bubble {
            display: inline-flex;
            gap: 5px;
            align-items: center;
            padding: 14px 4px;
        }

        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted-foreground);
            animation: tdot 1.2s infinite;
            opacity: 0.4;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes tdot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── DESMOS ── */
        .desmos-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin: 16px 0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* ── SVG ── */
        .svg-container {
            text-align: center;
            margin: 16px 0;
        }

        .svg-container svg {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* ── STEPS ── */
        .steps-container { margin: 16px 0; }

        .step-item {
            border-left: 3px solid var(--step-blue);
            padding: 10px 14px;
            margin-bottom: 10px;
            background: hsl(220, 40%, 98%);
            border-radius: 0 8px 8px 0;
        }

        .step-next-btn {
            background: var(--step-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            margin-top: 4px;
            transition: opacity 0.15s;
        }

        .step-next-btn:hover { opacity: 0.88; }
        .step-next-btn:disabled { opacity: 0.5; cursor: default; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.35s ease; }

        /* ── ACTION AREA ── */
        .action-area {
            border-top: 1px solid var(--border);
            padding: 12px 24px 16px;
            background: hsla(0, 0%, 100%, 0.95);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }

        .action-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .answer-row { display: flex; gap: 8px; align-items: flex-end; }

        .answer-input {
            flex: 1;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-family: var(--font);
            font-size: 16px;
            color: var(--foreground);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 100px;
            line-height: 1.5;
            scrollbar-width: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .answer-input::-webkit-scrollbar { display: none; }

        .answer-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px hsla(220, 60%, 20%, 0.08);
        }

        .answer-input::placeholder { color: var(--muted-foreground); opacity: 0.7; }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-primary.full-width {
            width: 100%;
            justify-content: center;
            padding: 12px 20px;
            font-size: 16px;
        }

        .secondary-btns { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            background: var(--card);
            color: var(--foreground);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

        .nav-row { display: flex; gap: 8px; }

        .nav-row .btn-secondary {
            flex: 1;
            justify-content: center;
            padding: 10px 14px;
            font-size: 15px;
        }

        /* ── START SCREEN ── */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 56px 24px 32px;
            gap: 20px;
        }

        .start-icon {
            width: 72px; height: 72px;
            background: var(--amber-light, hsl(45,90%,92%));
            border: 2px solid var(--amber, hsl(45,90%,55%));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .start-topic {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--primary);
            line-height: 1.2;
        }

        .start-subject {
            font-size: 15px;
            color: var(--muted-foreground);
        }

        .btn-start {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 8px;
        }

        .btn-start:hover { opacity: 0.88; }

        @media (max-width: 600px) {
            .lesson-inner { padding: 16px 16px 8px; }
            .action-area { padding: 10px 16px 14px; }
            .message-group.user .message-bubble { max-width: 90%; }
            .nav-container { padding: 0 16px; }
            .desmos-container { height: 200px; }
            .start-topic { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <span class="nav-topic" id="navTopic">Loading…</span>
        </div>
        <span class="nav-subject" id="navSubject"></span>
    </div>
</nav>

<div class="lesson-scroll" id="lessonScroll">
    <div class="lesson-inner">
        <div id="startScreen" class="start-screen">
            <div class="start-icon">📐</div>
            <div>
                <div class="start-topic" id="startTopic"></div>
                <div class="start-subject" id="startSubject"></div>
            </div>
            <button class="btn-start" id="startBtn" onclick="startLesson()">
                Start Lesson →
            </button>
        </div>
        <div id="messagesInner"></div>
    </div>
</div>

<div class="action-area" id="actionArea" style="display:none;">
    <div class="action-wrapper" id="actionWrapper"></div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const subject = params.get('subject') || 'AM';
    const topic   = params.get('topic')   || 'Differentiation';

    const subjectLabels = { AM: 'A-Math', EM: 'E-Math', JC: 'H2 Math' };
    const subjectLabel = subjectLabels[subject] || subject;
    document.title = `${topic} — Adrian's Math Tuition`;
    document.getElementById('navTopic').textContent = topic;
    document.getElementById('navSubject').textContent = subjectLabel;
    document.getElementById('startTopic').textContent = topic;
    document.getElementById('startSubject').textContent = subjectLabel;

    function startLesson() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('actionArea').style.display = '';
        callLearn({ action: 'start' });
    }

    let conversationHistory = [];
    let isLoading = false;
    let lessonStatus = { hasMore: true, questionActive: false };
    let practiceMode = false;
    let visualsMap = {}; // id → visual object, populated from first SSE event

    // ── SECTION HISTORY ──
    // Each entry: { userLabel, aiText, status, practiceMode }
    const lessonSections = [];
    let currentSectionIndex = -1;

    function saveSection(userLabel, aiText) {
        lessonSections.push({ userLabel, aiText, status: { ...lessonStatus }, practiceMode });
        currentSectionIndex = lessonSections.length - 1;
    }

    function displaySection(index) {
        if (index < 0 || index >= lessonSections.length) return;
        currentSectionIndex = index;
        const section = lessonSections[index];
        lessonStatus = { ...section.status };
        practiceMode = section.practiceMode;

        const inner = document.getElementById('messagesInner');
        inner.innerHTML = '';

        if (section.userLabel) {
            const g = document.createElement('div');
            g.className = 'message-group user';
            g.innerHTML = `<div class="message-bubble">${escapeHtml(section.userLabel)}</div>`;
            inner.appendChild(g);
        }

        const botGroup = document.createElement('div');
        botGroup.className = 'message-group bot';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const content = document.createElement('div');
        bubble.appendChild(content);
        botGroup.appendChild(bubble);
        inner.appendChild(botGroup);

        renderContent(section.aiText, content);
        scrollToBottom();
        updateActionButtons();
    }

    function isAtLatestSection() {
        return currentSectionIndex === lessonSections.length - 1;
    }

    // ── TEXT + LATEX RENDERING ──
    function renderTextAndLatex(el, text) {
        text = text.replace(/`([^`\n]+)`/g, '$$$1$');
        let html = text
            .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');

        if (typeof katex !== 'undefined') {
            html = html.replace(/\$\$([^$]+?)\$\$/g, (_, math) => {
                try { return katex.renderToString(math, { displayMode: true, throwOnError: false }); }
                catch(e) { return `$$${math}$$`; }
            });
            html = html.replace(/(?<!\$)\$([^$\n]{1,200}?)\$(?!\$)/g, (_, math) => {
                try { return katex.renderToString(math, { displayMode: false, throwOnError: false }); }
                catch(e) { return `$${math}$`; }
            });
        }

        html = html.replace(/\n/g, '<br>');
        el.innerHTML = html;
    }

    // ── CONTENT PARSING ──
    // Splits text into segments: { type: 'text'|'visual'|'steps', ... }
    function parseSegments(text) {
        const segments = [];
        // Match [VISUAL:id], [STEPS]...[/STEPS]
        const pattern = /\[VISUAL:([^\]]+)\]|\[STEPS\]([\s\S]*?)\[\/STEPS\]/g;
        let lastIndex = 0;
        let match;

        while ((match = pattern.exec(text)) !== null) {
            if (match.index > lastIndex) {
                const t = text.slice(lastIndex, match.index);
                if (t.trim()) segments.push({ type: 'text', content: t });
            }

            if (match[1] !== undefined) {
                // [VISUAL:id]
                segments.push({ type: 'visual', id: match[1].trim() });
            } else if (match[2] !== undefined) {
                // [STEPS]...[/STEPS]
                const steps = match[2].split(/\n?---\n?/).map(s => s.trim()).filter(Boolean);
                segments.push({ type: 'steps', steps });
            }

            lastIndex = match.index + match[0].length;
        }

        const remaining = text.slice(lastIndex);
        if (remaining.trim()) segments.push({ type: 'text', content: remaining });

        return segments;
    }

    // ── FULL CONTENT RENDER ──
    function renderContent(text, container) {
        const segments = parseSegments(text);

        for (const seg of segments) {
            if (seg.type === 'text') {
                const div = document.createElement('div');
                renderTextAndLatex(div, seg.content);
                container.appendChild(div);

            } else if (seg.type === 'visual') {
                const visual = visualsMap[seg.id];
                if (!visual) {
                    // Unknown ID — skip silently
                    continue;
                }

                if (visual.type === 'desmos') {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'desmos-container';
                    container.appendChild(wrapper);
                    (function(el, exprs) {
                        const tryInit = (attempts) => {
                            if (typeof Desmos !== 'undefined') {
                                initDesmos(el, exprs);
                            } else if (attempts < 20) {
                                setTimeout(() => tryInit(attempts + 1), 200);
                            } else {
                                el.style.display = 'flex';
                                el.style.alignItems = 'center';
                                el.style.padding = '0 16px';
                                el.style.color = 'var(--muted-foreground)';
                                el.style.fontSize = '14px';
                                el.textContent = '📊 Graph unavailable in this browser';
                            }
                        };
                        requestAnimationFrame(() => tryInit(0));
                    })(wrapper, visual.expressions || []);

                } else if (visual.type === 'svg') {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'svg-container';
                    // Strip scripts for safety
                    const clean = (visual.svg || '').replace(/<script[\s\S]*?<\/script>/gi, '');
                    wrapper.innerHTML = clean;
                    container.appendChild(wrapper);

                } else if (visual.type === 'steps') {
                    const wrapper = document.createElement('div');
                    initSteps(wrapper, visual.steps || []);
                    container.appendChild(wrapper);
                }

            } else if (seg.type === 'steps') {
                const wrapper = document.createElement('div');
                initSteps(wrapper, seg.steps);
                container.appendChild(wrapper);
            }
        }
    }

    // ── DESMOS ──
    function initDesmos(container, expressions) {
        try {
            const calc = Desmos.GraphingCalculator(container, {
                expressions: false,
                keypad: false,
                settingsMenu: false,
                zoomButtons: true,
                border: false,
                expressionsTopbar: false
            });
            const colors = ['#2563eb', '#dc2626', '#059669', '#7c3aed'];
            expressions.forEach((expr, i) => {
                calc.setExpression({ id: 'e' + i, latex: expr.trim(), color: colors[i % 4] });
            });
        } catch(e) {
            container.textContent = '📊 Graph unavailable';
        }
    }

    // ── STEPS ANIMATION ──
    function initSteps(container, steps) {
        container.className = 'steps-container';

        const stepEls = steps.map((step, i) => {
            const el = document.createElement('div');
            el.className = 'step-item';
            el.style.display = i === 0 ? 'block' : 'none';
            renderTextAndLatex(el, step);
            container.appendChild(el);
            return el;
        });

        if (steps.length <= 1) return;

        let visible = 1;
        const btn = document.createElement('button');
        btn.className = 'step-next-btn';
        btn.textContent = `Next step ▶ (1/${steps.length})`;
        btn.onclick = () => {
            if (visible >= steps.length) return;
            stepEls[visible].style.display = 'block';
            stepEls[visible].classList.add('fade-in');
            visible++;
            if (visible >= steps.length) {
                btn.textContent = '✅ All steps shown';
                btn.disabled = true;
            } else {
                btn.textContent = `Next step ▶ (${visible}/${steps.length})`;
            }
            stepEls[visible - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        container.appendChild(btn);
    }

    // ── STATUS PARSING ──
    function extractStatus(text) {
        const match = text.match(/\|\|\|STATUS:(\{[^}]+\})\|\|\|/);
        if (!match) return null;
        try { return JSON.parse(match[1]); } catch(e) { return null; }
    }

    function stripStatus(text) {
        return text.replace(/\s*\|\|\|STATUS:\{[^}]+\}\|\|\|/g, '').trimEnd();
    }

    // ── MESSAGES ──
    function addUserMessage(text) {
        const inner = document.getElementById('messagesInner');
        const g = document.createElement('div');
        g.className = 'message-group user';
        g.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
        inner.appendChild(g);
        scrollToBottom();
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function addTyping() {
        const inner = document.getElementById('messagesInner');
        const g = document.createElement('div');
        g.className = 'message-group bot';
        g.id = 'typingGroup';
        g.innerHTML = `<div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>`;
        inner.appendChild(g);
        scrollToBottom();
    }

    function removeTyping() {
        const t = document.getElementById('typingGroup');
        if (t) t.remove();
    }

    function scrollToBottom() {
        const el = document.getElementById('lessonScroll');
        el.scrollTop = el.scrollHeight;
    }

    // ── CALL API ──
    async function callLearn({ action, studentAnswer, userLabel }) {
        if (isLoading) return;
        isLoading = true;
        setActionsDisabled(true);

        if (userLabel) addUserMessage(userLabel);
        addTyping();

        let fullText = '';

        try {
            const res = await fetch('/api/learn', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, topic, action, studentAnswer, conversationHistory })
            });

            if (!res.ok) {
                removeTyping();
                addErrorMessage('Something went wrong. Please try again.');
                isLoading = false;
                setActionsDisabled(false);
                return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let visualsReceived = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const parsed = JSON.parse(line.slice(6));
                        if (!visualsReceived && parsed.visuals) {
                            // First event: load visuals map
                            visualsReceived = true;
                            parsed.visuals.forEach(v => { visualsMap[v.id] = v; });
                        } else if (parsed.chunk) {
                            fullText += parsed.chunk;
                        }
                    } catch(e) {}
                }
            }

        } catch(err) {
            removeTyping();
            addErrorMessage('Connection error. Please try again.');
            isLoading = false;
            setActionsDisabled(false);
            return;
        }

        // Parse and clean
        const status = extractStatus(fullText);
        if (status) lessonStatus = status;
        const cleanText = stripStatus(fullText);

        // Render
        removeTyping();
        const inner = document.getElementById('messagesInner');
        const botGroup = document.createElement('div');
        botGroup.className = 'message-group bot';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const contentDiv = document.createElement('div');
        bubble.appendChild(contentDiv);
        botGroup.appendChild(bubble);
        inner.appendChild(botGroup);

        renderContent(cleanText, contentDiv);
        scrollToBottom();

        // Update history
        const actionMessages = {
            'start': 'Start the lesson. Teach me the first concept.',
            'next': 'Skip. Teach me the next concept.',
            'hint': 'Give me a hint.',
            'example': 'Show me a worked example.',
            'practice': 'Give me a practice question.',
            'solution': 'Show me the full solution.',
            'more': 'Give me another similar question.'
        };
        const userContent = action === 'answer' ? (studentAnswer || '') : (actionMessages[action] || action);
        conversationHistory.push({ role: 'user', content: userContent });
        conversationHistory.push({ role: 'assistant', content: cleanText });
        if (conversationHistory.length > 20) {
            conversationHistory = conversationHistory.slice(conversationHistory.length - 20);
        }

        saveSection(userLabel || null, cleanText);
        updateActionButtons();

        isLoading = false;
        setActionsDisabled(false);
    }

    function addErrorMessage(msg) {
        const inner = document.getElementById('messagesInner');
        const g = document.createElement('div');
        g.className = 'message-group bot';
        g.innerHTML = `<div class="message-bubble" style="color:hsl(0,60%,45%);font-size:15px;">${msg}</div>`;
        inner.appendChild(g);
        scrollToBottom();
    }

    function setActionsDisabled(disabled) {
        document.querySelectorAll('#actionWrapper button, #actionWrapper textarea').forEach(el => {
            el.disabled = disabled;
        });
    }

    // ── ACTION BUTTONS ──
    function updateActionButtons() {
        const wrapper = document.getElementById('actionWrapper');
        wrapper.innerHTML = '';

        const hasPrev = currentSectionIndex > 0;
        const hasNext = currentSectionIndex < lessonSections.length - 1;

        if (!isAtLatestSection()) {
            const row = document.createElement('div');
            row.className = 'nav-row';
            if (hasPrev) row.appendChild(buildSecondaryBtn('← Previous', () => displaySection(currentSectionIndex - 1)));
            if (hasNext) row.appendChild(buildSecondaryBtn('Next →', () => displaySection(currentSectionIndex + 1)));
            wrapper.appendChild(row);
            return;
        }

        if (lessonStatus.questionActive && !practiceMode) {
            wrapper.appendChild(buildAnswerRow());
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => displaySection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('💡 Hint', () => callLearn({ action: 'hint', userLabel: 'Give me a hint' })));
            secondary.appendChild(buildSecondaryBtn('⏭ Skip', () => callLearn({ action: 'next', userLabel: 'Skip — show me the next concept' })));
            secondary.appendChild(buildSecondaryBtn('📖 Example', () => callLearn({ action: 'example', userLabel: 'Show me an example' })));
            secondary.appendChild(buildSecondaryBtn('🔍 Explain more', () => callLearn({ action: 'explain', userLabel: 'Explain more' })));
            wrapper.appendChild(secondary);

        } else if (practiceMode) {
            wrapper.appendChild(buildAnswerRow());
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => displaySection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('💡 Hint', () => callLearn({ action: 'hint', userLabel: 'Give me a hint' })));
            secondary.appendChild(buildSecondaryBtn('✅ Solution', () => callLearn({ action: 'solution', userLabel: 'Show full solution' })));
            secondary.appendChild(buildSecondaryBtn('🔁 Another', () => callLearn({ action: 'more', userLabel: 'Give me another question' })));
            wrapper.appendChild(secondary);

        } else if (lessonStatus.hasMore) {
            const btn = document.createElement('button');
            btn.className = 'btn-primary full-width';
            btn.textContent = 'Continue →';
            btn.onclick = () => callLearn({ action: 'next', userLabel: 'Continue' });
            wrapper.appendChild(btn);
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => displaySection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('🏋️ Practice', () => { practiceMode = true; callLearn({ action: 'practice', userLabel: 'Give me a practice question' }); }));
            secondary.appendChild(buildSecondaryBtn('🔍 Explain more', () => callLearn({ action: 'explain', userLabel: 'Explain more' })));
            secondary.appendChild(buildSecondaryBtn('📖 Example', () => callLearn({ action: 'example', userLabel: 'Show me an example' })));
            wrapper.appendChild(secondary);

        } else {
            const btn = document.createElement('button');
            btn.className = 'btn-primary full-width';
            btn.textContent = '🏋️ Practice Question';
            btn.onclick = () => { practiceMode = true; callLearn({ action: 'practice', userLabel: 'Give me a practice question' }); };
            wrapper.appendChild(btn);
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => displaySection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('🔄 Start Over', () => {
                conversationHistory = [];
                lessonStatus = { hasMore: true, questionActive: false };
                practiceMode = false;
                lessonSections.length = 0;
                currentSectionIndex = -1;
                document.getElementById('messagesInner').innerHTML = '';
                callLearn({ action: 'start' });
            }));
            wrapper.appendChild(secondary);
        }
    }

    function buildAnswerRow() {
        const row = document.createElement('div');
        row.className = 'answer-row';

        const ta = document.createElement('textarea');
        ta.className = 'answer-input';
        ta.placeholder = 'Your answer…';
        ta.rows = 1;
        ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        });
        ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(ta); }
        });

        const btn = document.createElement('button');
        btn.className = 'btn-primary';
        btn.textContent = 'Submit';
        btn.onclick = () => submitAnswer(ta);

        row.appendChild(ta);
        row.appendChild(btn);
        requestAnimationFrame(() => ta.focus());
        return row;
    }

    function submitAnswer(ta) {
        const val = ta.value.trim();
        if (!val || isLoading) return;
        callLearn({ action: 'answer', studentAnswer: val, userLabel: val });
    }

    function buildSecondaryBtn(label, onClick) {
        const btn = document.createElement('button');
        btn.className = 'btn-secondary';
        btn.textContent = label;
        btn.onclick = onClick;
        return btn;
    }

    // ── INIT ── Show start screen; API called only when student clicks Start Lesson
    // (action area hidden until startLesson() is called)
</script>
</body>
</html>
