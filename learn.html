<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn — Adrian's Math Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --background: hsl(210, 20%, 98%);
            --foreground: hsl(220, 40%, 13%);
            --card: hsl(0, 0%, 100%);
            --primary: hsl(220, 60%, 20%);
            --primary-foreground: hsl(45, 100%, 96%);
            --muted: hsl(220, 15%, 93%);
            --muted-foreground: hsl(220, 10%, 46%);
            --border: hsl(220, 15%, 88%);
            --amber: hsl(45, 90%, 55%);
            --amber-light: hsl(45, 90%, 92%);
            --amber-dark: hsl(40, 80%, 42%);
            --green: hsl(145, 60%, 42%);
            --green-light: hsl(145, 60%, 94%);
            --radius: 0.75rem;
            --font: 'DM Sans', sans-serif;
            --font-display: 'DM Serif Display', serif;
        }

        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--foreground);
            font-size: 17px;
            line-height: 1.75;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── NAV ── */
        nav {
            position: relative;
            z-index: 50;
            background: hsla(0, 0%, 100%, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .nav-container {
            max-width: 1152px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted-foreground);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.15s;
            flex-shrink: 0;
        }

        .back-link:hover { color: var(--primary); }

        .nav-topic {
            font-family: var(--font-display);
            font-size: 17px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-subject {
            font-size: 12px;
            color: var(--muted-foreground);
            background: var(--muted);
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── SCROLL AREA ── */
        .lesson-scroll {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .lesson-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 24px 8px;
        }

        /* ── MESSAGES ── */
        .message-group {
            margin-bottom: 20px;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-group.user {
            display: flex;
            justify-content: flex-end;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 17px;
            line-height: 1.7;
        }

        .message-group.user .message-bubble {
            background: var(--primary);
            color: var(--primary-foreground);
            border-bottom-right-radius: 4px;
            max-width: 78%;
        }

        .message-group.bot .message-bubble {
            background: var(--background);
            border: none;
            border-bottom-left-radius: 4px;
            color: var(--foreground);
            max-width: 100%;
            padding-left: 0;
        }

        /* KaTeX */
        .message-bubble .katex { font-size: 1.05em; }
        .message-bubble .katex-display { margin: 12px 0; overflow-x: auto; }
        .message-bubble strong { font-weight: 600; }

        /* Typing indicator */
        .typing-bubble {
            display: inline-flex;
            gap: 5px;
            align-items: center;
            padding: 14px 4px;
        }

        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted-foreground);
            animation: tdot 1.2s infinite;
            opacity: 0.4;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes tdot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── BOTTOM ACTION AREA ── */
        .action-area {
            border-top: 1px solid var(--border);
            padding: 12px 24px 16px;
            background: hsla(0, 0%, 100%, 0.95);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }

        .action-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Answer input row */
        .answer-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .answer-input {
            flex: 1;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-family: var(--font);
            font-size: 16px;
            color: var(--foreground);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 100px;
            line-height: 1.5;
            scrollbar-width: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .answer-input::-webkit-scrollbar { display: none; }

        .answer-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px hsla(220, 60%, 20%, 0.08);
        }

        .answer-input::placeholder { color: var(--muted-foreground); opacity: 0.7; }

        /* Buttons */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-primary.full-width {
            width: 100%;
            justify-content: center;
            padding: 12px 20px;
            font-size: 16px;
        }

        .secondary-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            background: var(--card);
            color: var(--foreground);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--card);
        }

        .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── NAV ROW (back/forward between sections) ── */
        .nav-row {
            display: flex;
            gap: 8px;
        }

        .nav-row .btn-secondary {
            flex: 1;
            justify-content: center;
            padding: 10px 14px;
            font-size: 15px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .lesson-inner { padding: 16px 16px 8px; }
            .action-area { padding: 10px 16px 14px; }
            .message-group.user .message-bubble { max-width: 90%; }
            .nav-container { padding: 0 16px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <span class="nav-topic" id="navTopic">Loading…</span>
        </div>
        <span class="nav-subject" id="navSubject"></span>
    </div>
</nav>

<div class="lesson-scroll" id="lessonScroll">
    <div class="lesson-inner">
        <div id="messagesInner"></div>
    </div>
</div>

<div class="action-area" id="actionArea">
    <div class="action-wrapper" id="actionWrapper">
        <!-- Populated by JS -->
    </div>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const subject = params.get('subject') || 'AM';
    const topic   = params.get('topic')   || 'Differentiation';

    const subjectLabels = { AM: 'A-Math', EM: 'E-Math', JC: 'H2 Math' };
    document.title = `${topic} — Adrian's Math Tuition`;
    document.getElementById('navTopic').textContent = topic;
    document.getElementById('navSubject').textContent = subjectLabels[subject] || subject;

    let conversationHistory = [];
    let isLoading = false;
    let lessonStatus = { hasMore: true, questionActive: false };
    let practiceMode = false;

    // ── SECTION HISTORY ──
    // Each section: { html: string (innerHTML snapshot), status, practiceMode }
    const lessonSections = [];
    let currentSectionIndex = -1;

    function saveSection() {
        const html = document.getElementById('messagesInner').innerHTML;
        lessonSections.push({ html, status: { ...lessonStatus }, practiceMode });
        currentSectionIndex = lessonSections.length - 1;
    }

    function goToSection(index) {
        if (index < 0 || index >= lessonSections.length) return;
        currentSectionIndex = index;
        const section = lessonSections[index];
        document.getElementById('messagesInner').innerHTML = section.html;
        lessonStatus = { ...section.status };
        practiceMode = section.practiceMode;
        scrollToBottom();
        updateActionButtons();
    }

    function isAtLatestSection() {
        return currentSectionIndex === lessonSections.length - 1;
    }

    // ── RENDER MATH ──
    function renderToElement(el, text) {
        text = text.replace(/`([^`\n]+)`/g, '$$$1$');
        let html = text
            .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');

        if (typeof katex !== 'undefined') {
            html = html.replace(/\$\$([^$]+?)\$\$/g, (_, math) => {
                try { return katex.renderToString(math, { displayMode: true, throwOnError: false }); }
                catch(e) { return `$$${math}$$`; }
            });
            html = html.replace(/(?<!\$)\$([^$\n]{1,200}?)\$(?!\$)/g, (_, math) => {
                try { return katex.renderToString(math, { displayMode: false, throwOnError: false }); }
                catch(e) { return `$${math}$`; }
            });
        }

        html = html.replace(/\n/g, '<br>');
        el.innerHTML = html;
    }

    // ── MESSAGES ──
    function addUserMessage(text) {
        const inner = document.getElementById('messagesInner');
        const group = document.createElement('div');
        group.className = 'message-group user';
        group.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
        inner.appendChild(group);
        scrollToBottom();
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTyping() {
        const inner = document.getElementById('messagesInner');
        const group = document.createElement('div');
        group.className = 'message-group bot';
        group.id = 'typingGroup';
        group.innerHTML = `<div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>`;
        inner.appendChild(group);
        scrollToBottom();
    }

    function removeTyping() {
        const t = document.getElementById('typingGroup');
        if (t) t.remove();
    }

    function addStreamingMessage() {
        const inner = document.getElementById('messagesInner');
        const group = document.createElement('div');
        group.className = 'message-group bot';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const textDiv = document.createElement('div');
        bubble.appendChild(textDiv);
        group.appendChild(bubble);
        inner.appendChild(group);
        scrollToBottom();
        return textDiv;
    }

    function scrollToBottom() {
        const el = document.getElementById('lessonScroll');
        el.scrollTop = el.scrollHeight;
    }

    // ── STATUS PARSING ──
    function extractStatus(text) {
        const match = text.match(/\|\|\|STATUS:(\{[^}]+\})\|\|\|/);
        if (!match) return null;
        try { return JSON.parse(match[1]); } catch(e) { return null; }
    }

    function stripStatus(text) {
        return text.replace(/\s*\|\|\|STATUS:\{[^}]+\}\|\|\|/g, '').trimEnd();
    }

    // ── CALL API ──
    async function callLearn({ action, studentAnswer, userLabel }) {
        if (isLoading) return;
        isLoading = true;
        setActionsDisabled(true);

        if (userLabel) addUserMessage(userLabel);
        addTyping();

        try {
            const res = await fetch('/api/learn', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, topic, action, studentAnswer, conversationHistory })
            });

            if (!res.ok) {
                removeTyping();
                addErrorMessage('Something went wrong. Please try again.');
                isLoading = false;
                setActionsDisabled(false);
                return;
            }

            removeTyping();
            const streamDiv = addStreamingMessage();
            let fullText = '';
            let renderTimer = null;

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const parsed = JSON.parse(line.slice(6));
                        if (parsed.chunk) {
                            fullText += parsed.chunk;
                            if (!renderTimer) {
                                renderTimer = requestAnimationFrame(() => {
                                    renderTimer = null;
                                    renderToElement(streamDiv, stripStatus(fullText));
                                    scrollToBottom();
                                });
                            }
                        }
                    } catch(e) {}
                }
            }

            // Final render
            const status = extractStatus(fullText);
            if (status) lessonStatus = status;
            const cleanText = stripStatus(fullText);
            renderToElement(streamDiv, cleanText);
            scrollToBottom();

            // Update conversation history
            const actionMessages = {
                'start': 'Start the lesson. Teach me the first concept.',
                'next': 'Skip this question. Teach me the next concept.',
                'hint': 'Give me a hint for this question.',
                'example': 'Show me a worked example for this concept.',
                'practice': 'Give me a practice question.',
                'solution': 'Show me the full solution for that practice question.',
                'more': 'Give me another similar practice question.'
            };
            const userContent = action === 'answer' ? (studentAnswer || '') : (actionMessages[action] || action);
            conversationHistory.push({ role: 'user', content: userContent });
            conversationHistory.push({ role: 'assistant', content: cleanText });
            if (conversationHistory.length > 20) {
                conversationHistory = conversationHistory.slice(conversationHistory.length - 20);
            }

            // Save this as a new section
            saveSection();
            updateActionButtons();

        } catch(err) {
            removeTyping();
            addErrorMessage('Connection error. Please try again.');
        }

        isLoading = false;
        setActionsDisabled(false);
    }

    function addErrorMessage(msg) {
        const inner = document.getElementById('messagesInner');
        const group = document.createElement('div');
        group.className = 'message-group bot';
        group.innerHTML = `<div class="message-bubble" style="color:hsl(0,60%,45%);font-size:15px;">${msg}</div>`;
        inner.appendChild(group);
        scrollToBottom();
    }

    function setActionsDisabled(disabled) {
        document.querySelectorAll('#actionWrapper button, #actionWrapper textarea').forEach(el => {
            el.disabled = disabled;
        });
    }

    // ── ACTION BUTTONS ──
    function updateActionButtons() {
        const wrapper = document.getElementById('actionWrapper');
        wrapper.innerHTML = '';

        const hasPrev = currentSectionIndex > 0;
        const hasNext = currentSectionIndex < lessonSections.length - 1;

        // If browsing a previously-visited section, show prev/next nav only
        if (!isAtLatestSection()) {
            const row = document.createElement('div');
            row.className = 'nav-row';
            if (hasPrev) {
                row.appendChild(buildSecondaryBtn('← Previous', () => goToSection(currentSectionIndex - 1)));
            }
            if (hasNext) {
                row.appendChild(buildSecondaryBtn('Next →', () => goToSection(currentSectionIndex + 1)));
            }
            wrapper.appendChild(row);
            return;
        }

        // At the latest section — show normal action buttons
        if (lessonStatus.questionActive && !practiceMode) {
            wrapper.appendChild(buildAnswerRow('Your answer…', 'answer'));
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => goToSection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('💡 Hint', () => callLearn({ action: 'hint', userLabel: 'Give me a hint' })));
            secondary.appendChild(buildSecondaryBtn('⏭ Skip', () => callLearn({ action: 'next', userLabel: 'Skip — show me the next concept' })));
            secondary.appendChild(buildSecondaryBtn('📖 Example', () => callLearn({ action: 'example', userLabel: 'Show me an example' })));
            wrapper.appendChild(secondary);

        } else if (practiceMode) {
            wrapper.appendChild(buildAnswerRow('Your answer…', 'answer'));
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => goToSection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('💡 Hint', () => callLearn({ action: 'hint', userLabel: 'Give me a hint' })));
            secondary.appendChild(buildSecondaryBtn('✅ Full Solution', () => callLearn({ action: 'solution', userLabel: 'Show full solution' })));
            secondary.appendChild(buildSecondaryBtn('🔁 Another', () => callLearn({ action: 'more', userLabel: 'Give me another question' })));
            wrapper.appendChild(secondary);

        } else if (lessonStatus.hasMore) {
            const btn = document.createElement('button');
            btn.className = 'btn-primary full-width';
            btn.innerHTML = 'Continue →';
            btn.onclick = () => callLearn({ action: 'next', userLabel: 'Continue' });
            wrapper.appendChild(btn);
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => goToSection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('🏋️ Practice', () => { practiceMode = true; callLearn({ action: 'practice', userLabel: 'Give me a practice question' }); }));
            secondary.appendChild(buildSecondaryBtn('📖 Example', () => callLearn({ action: 'example', userLabel: 'Show me an example' })));
            wrapper.appendChild(secondary);

        } else {
            const btn = document.createElement('button');
            btn.className = 'btn-primary full-width';
            btn.innerHTML = '🏋️ Practice Question';
            btn.onclick = () => { practiceMode = true; callLearn({ action: 'practice', userLabel: 'Give me a practice question' }); };
            wrapper.appendChild(btn);
            const secondary = document.createElement('div');
            secondary.className = 'secondary-btns';
            if (hasPrev) secondary.appendChild(buildSecondaryBtn('← Previous', () => goToSection(currentSectionIndex - 1)));
            secondary.appendChild(buildSecondaryBtn('🔄 Start Over', () => {
                conversationHistory = [];
                lessonStatus = { hasMore: true, questionActive: false };
                practiceMode = false;
                lessonSections.length = 0;
                currentSectionIndex = -1;
                document.getElementById('messagesInner').innerHTML = '';
                callLearn({ action: 'start' });
            }));
            wrapper.appendChild(secondary);
        }
    }

    function buildAnswerRow(placeholder, action) {
        const row = document.createElement('div');
        row.className = 'answer-row';

        const ta = document.createElement('textarea');
        ta.className = 'answer-input';
        ta.placeholder = placeholder;
        ta.rows = 1;
        ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        });
        ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitAnswer(ta, action);
            }
        });

        const btn = document.createElement('button');
        btn.className = 'btn-primary';
        btn.innerHTML = 'Submit';
        btn.onclick = () => submitAnswer(ta, action);

        row.appendChild(ta);
        row.appendChild(btn);

        requestAnimationFrame(() => ta.focus());
        return row;
    }

    function submitAnswer(ta, action) {
        const val = ta.value.trim();
        if (!val || isLoading) return;
        callLearn({ action, studentAnswer: val, userLabel: val });
    }

    function buildSecondaryBtn(label, onClick) {
        const btn = document.createElement('button');
        btn.className = 'btn-secondary';
        btn.innerHTML = label;
        btn.onclick = onClick;
        return btn;
    }

    // ── INIT ──
    updateActionButtons();
    callLearn({ action: 'start' });
</script>
</body>
</html>
